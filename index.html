<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LQC Shipping Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;background:#e8ecf3;color:#0f172a;}
  input,select,textarea{font-family:inherit;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:#3b82f6!important;box-shadow:0 0 0 3px rgba(59,130,246,0.1)!important;}
  button{font-family:inherit;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#c1cad6;border-radius:10px;}
  ::-webkit-scrollbar-thumb:hover{background:#94a3b8;}
  .modal-overlay{position:fixed;inset:0;background:rgba(8,16,36,0.7);backdrop-filter:blur(8px);display:flex;align-items:flex-start;justify-content:center;z-index:999;padding-top:32px;overflow:auto;}
  .nav-item:hover{background:rgba(255,255,255,0.08)!important;color:#e2e8f0!important;}
  .tbl-row:hover > td{background:rgba(37,99,235,0.035)!important;}
  .kpi-card{transition:box-shadow 0.18s,transform 0.18s;}
  .kpi-card:hover{box-shadow:0 8px 32px rgba(15,23,42,0.14)!important;transform:translateY(-2px);}
  .stat-card:hover{box-shadow:0 6px 24px rgba(15,23,42,0.12)!important;}
  .arrival-card{transition:box-shadow 0.15s,transform 0.15s;}
  .arrival-card:hover{box-shadow:0 6px 20px rgba(15,23,42,0.12)!important;transform:translateY(-1px);}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef,useId} = React;

// ─── CONFIG — paste your Apps Script Web App URL here ─────
const API_URL = "https://script.google.com/macros/s/AKfycbwcdLfVnDtj68n1Ae-JfdZ9bMnZNpsci1T2YzO0MXHMcRHVJl-So8zPy0qSxDQyOez3Zg/exec";
const APP_PIN = "1234"; // Must match PIN in Apps Script

// ─── CONSTANTS ────────────────────────────────────────────
const STATUSES = ["PO Placed","In Production","Ready to Ship","In Transit","Arrived","Delivered"];
const STATUS_COLORS = {"PO Placed":"#6366f1","In Production":"#f59e0b","Ready to Ship":"#0ea5e9","In Transit":"#8b5cf6","Arrived":"#10b981","Delivered":"#64748b"};
const MODEL_COLORS = {"Direct to Client":"#b45309","US Warehouse":"#0e7490","Port Pickup":"#7c3aed"};
const LANE_DAYS = {east:55,west:30,gulf:40,default:45};
const WAREHOUSE_LOCATIONS=["Unitrans - PA","Unitrans - MA","RJW - TX","RJW - PA","Direct to Client","Other"];
const INTERNAL_LOCS=new Set(["Unitrans - PA","Unitrans - MA","RJW - TX","RJW - PA","Unitrans","RJW"]);
const WARN_DAYS = 3;
const TABS = ["Dashboard","Shipments","SKU Search","Timeline","Calendar","Alerts","Analytics","Item Setup","Locations","Manage"];
const DEFAULT_LOCS=[
  {id:"loc1",name:"Unitrans - PA",code:"UT-PA",type:"Warehouse",city:"",state:"PA",address:"",contact:"",phone:"",email:"",notes:"",customers:[]},
  {id:"loc2",name:"Unitrans - MA",code:"UT-MA",type:"Warehouse",city:"",state:"MA",address:"",contact:"",phone:"",email:"",notes:"",customers:[]},
  {id:"loc3",name:"RJW - TX",code:"RJW-TX",type:"Warehouse",city:"",state:"TX",address:"",contact:"",phone:"",email:"",notes:"",customers:[]},
  {id:"loc4",name:"RJW - PA",code:"RJW-PA",type:"Warehouse",city:"",state:"PA",address:"",contact:"",phone:"",email:"",notes:"",customers:[]},
];

const V = {
  bg:"#ffffff", bg2:"#f8fafc", bg3:"#eef1f7",
  border:"rgba(15,23,42,0.08)", border2:"rgba(15,23,42,0.16)",
  text:"#0f172a", text2:"#64748b", slate:"#0d1628"
};

// ─── UTILS ────────────────────────────────────────────────
const today = new Date(); today.setHours(0,0,0,0);
function parseDate(s){if(!s||s==="tba")return null;const d=new Date(s);return isNaN(d)?null:d;}
function fmtDate(s){const d=parseDate(s);if(!d)return"—";return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function daysDiff(d){if(!d)return null;return Math.round((d-today)/86400000);}
function getLaneDays(pod=""){
  const p=pod.toLowerCase();
  if(p.includes("new york")||p.includes("newark")||p.includes("boston")||p.includes("ny/nj")||p.includes("nyc"))return LANE_DAYS.east;
  if(p.includes("oakland")||p.includes("los angeles")||p.includes("lax")||p.includes("lgb")||p.includes("long beach")||p.includes("los")||p.includes("tacoma")||p.includes("seattle")||p.includes("vancouver"))return LANE_DAYS.west;
  if(p.includes("houston")||p.includes("galveston"))return LANE_DAYS.gulf;
  return LANE_DAYS.default;
}

// ─── API ──────────────────────────────────────────────────
async function apiGet(action){
  const r=await fetch(`${API_URL}?action=${action}&pin=${APP_PIN}`);
  return r.json();
}
async function apiPost(body){
  const r=await fetch(API_URL,{method:"POST",body:JSON.stringify({...body,pin:APP_PIN})});
  return r.json();
}

// ─── ALERT ENGINE ─────────────────────────────────────────
function buildAlerts(data,dismissed){
  const alerts=[];
  data.forEach(r=>{
    const etd=parseDate(r["ETD"]),eta=parseDate(r["ETA"]),mabd=parseDate(r["MABD"]);
    const status=r["Status"];
    const active=!["Delivered","Arrived"].includes(status);
    const po=r["LQC PO#"],customer=r["Customer"],agent=r["Agent"],dest=r["Destination"]||r["POD"];
    if(eta&&status==="In Transit"&&daysDiff(eta)<0){const id=`overdue-${po}`;if(!dismissed.has(id))alerts.push({id,type:"overdue",severity:"critical",po,customer,message:`ETA was ${fmtDate(r["ETA"])} — ${Math.abs(daysDiff(eta))}d overdue`,destination:dest,agent,eta:r["ETA"],etd:r["ETD"]});}
    if(etd&&status==="In Transit"){const lane=getLaneDays(r["POD"]),days=daysDiff(etd)*-1;if(days>lane){const id=`transit-${po}`;if(!dismissed.has(id))alerts.push({id,type:"transit",severity:"critical",po,customer,message:`On water ${days}d — lane avg ${lane}d`,destination:dest,agent,eta:r["ETA"],etd:r["ETD"]});}}
    if(etd&&active&&status!=="In Transit"&&status!=="Arrived"){const diff=daysDiff(etd);if(diff!==null&&diff>=0&&diff<=WARN_DAYS){const id=`etd-${po}`;if(!dismissed.has(id))alerts.push({id,type:"etd",severity:"warning",po,customer,message:`ETD ${fmtDate(r["ETD"])} — ${diff===0?"today":diff===1?"tomorrow":`in ${diff}d`}. Not yet shipped.`,destination:dest,agent,eta:r["ETA"],etd:r["ETD"]});}}
    if(eta&&status==="In Transit"){const diff=daysDiff(eta);if(diff!==null&&diff>=0&&diff<=WARN_DAYS){const id=`eta-${po}`;if(!dismissed.has(id))alerts.push({id,type:"eta",severity:"warning",po,customer,message:`ETA ${fmtDate(r["ETA"])} — arriving ${diff===0?"today":diff===1?"tomorrow":`in ${diff}d`}`,destination:dest,agent,eta:r["ETA"],etd:r["ETD"]});}}
    if(mabd&&eta&&active){const buf=daysDiff(mabd)-daysDiff(eta);if(buf>=0&&buf<=7){const id=`mabd-${po}`;if(!dismissed.has(id))alerts.push({id,type:"mabd",severity:"warning",po,customer,message:`MABD ${fmtDate(r["MABD"])} — only ${buf}d buffer after ETA`,destination:dest,agent,eta:r["ETA"],etd:r["ETD"]});}}
  });
  alerts.sort((a,b)=>({critical:0,warning:1}[a.severity]??2)-({critical:0,warning:1}[b.severity]??2));
  return alerts;
}

const ALERT_META={
  overdue:{label:"ETA Overdue",color:"#dc2626",icon:"⛔"},
  transit:{label:"Transit Exceeded",color:"#dc2626",icon:"🚢"},
  etd:{label:"ETD Approaching",color:"#b45309",icon:"📦"},
  eta:{label:"ETA Approaching",color:"#b45309",icon:"🛬"},
  mabd:{label:"MABD at Risk",color:"#7c3aed",icon:"⚠️"},
};

// ─── PIN SCREEN ───────────────────────────────────────────
function PinScreen({onAuth}){
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  function submit(e){e.preventDefault();if(pin===APP_PIN){localStorage.setItem("lqc_auth","1");onAuth();}else{setErr(true);setPin("");}}
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#08101f 0%,#0d1628 55%,#111d30 100%)"}}>
      <div style={{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(28px)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:22,padding:"52px 56px",minWidth:380,textAlign:"center",boxShadow:"0 40px 100px rgba(0,0,0,0.6)"}}>
        <div style={{width:52,height:52,background:"linear-gradient(135deg,#b45309,#f59e0b)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 22px",boxShadow:"0 6px 24px rgba(180,83,9,0.5)"}}>
          <span style={{fontSize:24,fontWeight:900,color:"#fff",fontFamily:"Georgia,serif"}}>L</span>
        </div>
        <div style={{fontSize:11,fontWeight:700,color:"#3d5070",letterSpacing:".16em",textTransform:"uppercase",marginBottom:8}}>LQC Logistics</div>
        <div style={{fontSize:26,fontWeight:700,color:"#f1f5f9",marginBottom:6,letterSpacing:"-0.02em"}}>Shipping Command</div>
        <div style={{fontSize:12,color:"#3d5070",marginBottom:36}}>Enter your team PIN to continue</div>
        <form onSubmit={submit}>
          <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setErr(false);}} placeholder="· · · · · · · ·" maxLength={8}
            style={{width:"100%",fontSize:24,padding:"14px 18px",border:`1px solid ${err?"#f87171":"rgba(255,255,255,0.1)"}`,borderRadius:12,textAlign:"center",letterSpacing:"0.45em",marginBottom:12,background:"rgba(255,255,255,0.05)",color:"#f1f5f9"}}/>
          {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:12,fontWeight:500}}>Incorrect PIN. Try again.</div>}
          <button type="submit" style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#b45309,#d97706)",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer",letterSpacing:"0.03em",boxShadow:"0 4px 20px rgba(180,83,9,0.45)"}}>Unlock Dashboard</button>
        </form>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(()=>localStorage.getItem("lqc_auth")==="1");
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [syncErr,setSyncErr]=useState(false);
  const [dismissed,setDismissed]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("lqc_dismissed")||"[]"));}catch{return new Set();}});
  const [tab,setTab]=useState("Dashboard");
  const [bellOpen,setBellOpen]=useState(false);
  const [editRow,setEditRow]=useState(null);
  const [alertTypeFilter,setAlertTypeFilter]=useState("All");
  const [selected,setSelected]=useState(new Set());
  const [bulkStatus,setBulkStatus]=useState("");
  const [calMonth,setCalMonth]=useState(new Date());
  const [lastSync,setLastSync]=useState(null);
  const [itemSetup,setItemSetup]=useState(()=>{try{return JSON.parse(localStorage.getItem("lqc_item_setup")||"{}");}catch{return{};}});
  const [itemSetupSyncing,setItemSetupSyncing]=useState(false);
  const [locations,setLocations]=useState(()=>{try{const s=JSON.parse(localStorage.getItem("lqc_locations")||"null");return s&&s.length>0?s:DEFAULT_LOCS;}catch{return DEFAULT_LOCS;}});
  function saveLocations(updated){setLocations(updated);localStorage.setItem("lqc_locations",JSON.stringify(updated));}

  async function saveItemSetup(updated){
    setItemSetup(updated);
    localStorage.setItem("lqc_item_setup",JSON.stringify(updated));
    setItemSetupSyncing(true);
    try{await apiPost({action:"saveItemSetup",itemSetup:updated});}catch{}
    setItemSetupSyncing(false);
  }


  // Load data from Google Sheet
  const loadData=useCallback(async()=>{
    if(!authed)return;
    setLoading(true);setSyncErr(false);
    try{
      const [res,setupRes]=await Promise.all([apiGet("getAll"),apiGet("getItemSetup")]);
      if(res.shipments){
        try{
          const lcc=JSON.parse(localStorage.getItem("lqc_costs")||"{}");
          setData(res.shipments.map(r=>{const lc=lcc[r["LQC PO#"]]||{};return{...r,"Container Cost":r["Container Cost"]||lc["Container Cost"]||"","Drayage":r["Drayage"]||lc["Drayage"]||""};}));
        }catch{setData(res.shipments);}
        setLastSync(new Date());
      }
      else setSyncErr(true);
      if(setupRes?.itemSetup&&typeof setupRes.itemSetup==="object"){
        setItemSetup(setupRes.itemSetup);
        localStorage.setItem("lqc_item_setup",JSON.stringify(setupRes.itemSetup));
      }
    }catch{setSyncErr(true);}
    setLoading(false);
  },[authed]);

  useEffect(()=>{if(authed)loadData();},[authed,loadData]);
  // Auto-refresh every 60s
  useEffect(()=>{if(!authed)return;const t=setInterval(loadData,60000);return()=>clearInterval(t);},[authed,loadData]);

  const alerts=useMemo(()=>buildAlerts(data,dismissed),[data,dismissed]);
  const criticalCount=alerts.filter(a=>a.severity==="critical").length;
  const skuCatalog=useMemo(()=>{
    const set=new Set();
    data.forEach(r=>{
      const skus=Array.isArray(r["SKUs"])?r["SKUs"]:[];
      skus.forEach(s=>{
        const name=String(s?.sku||"").trim();
        if(name)set.add(name);
      });
    });
    return [...set].sort((a,b)=>a.localeCompare(b));
  },[data]);

  function saveDismissed(s){setDismissed(s);localStorage.setItem("lqc_dismissed",JSON.stringify([...s]));}
  function dismiss(id){saveDismissed(new Set([...dismissed,id]));}
  function dismissAll(){saveDismissed(new Set([...dismissed,...alerts.map(a=>a.id)]));}

  async function saveRow(row){
    setSyncing(true);
    try{const po=row["LQC PO#"];if(po){const lcc=JSON.parse(localStorage.getItem("lqc_costs")||"{}");lcc[po]={"Container Cost":row["Container Cost"]||"","Drayage":row["Drayage"]||""};localStorage.setItem("lqc_costs",JSON.stringify(lcc));}}catch{}
    try{await apiPost({action:"save",row});}catch{}
    setSyncing(false);
    await loadData();
  }
  async function deleteRow(po){
    setSyncing(true);
    try{const lcc=JSON.parse(localStorage.getItem("lqc_costs")||"{}");delete lcc[po];localStorage.setItem("lqc_costs",JSON.stringify(lcc));}catch{}
    try{await apiPost({action:"delete",po});}catch{}
    setSyncing(false);
    await loadData();
  }
  async function quickStatus(po,status){
    const row=data.find(r=>r["LQC PO#"]===po);
    if(!row)return;
    await saveRow({...row,Status:status});
  }
  async function applyBulk(){
    if(!bulkStatus||!selected.size)return;
    setSyncing(true);
    const rows=data.filter(r=>selected.has(r["LQC PO#"])).map(r=>({...r,Status:bulkStatus}));
    try{await apiPost({action:"bulkSave",rows});}catch{}
    setSyncing(false);
    setSelected(new Set());setBulkStatus("");
    await loadData();
  }

  const toggleSelect=(po)=>setSelected(prev=>{const n=new Set(prev);n.has(po)?n.delete(po):n.add(po);return n;});
  const toggleAll=(rows)=>setSelected(prev=>prev.size===rows.length&&rows.length>0?new Set():new Set(rows.map(r=>r["LQC PO#"])));

  if(!authed)return<PinScreen onAuth={()=>setAuthed(true)}/>;

  return(
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"inherit",background:V.bg3,color:V.text}}>
      {/* Sidebar */}
      <div style={{width:220,background:V.slate,display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh",overflowY:"auto",borderRight:"1px solid rgba(255,255,255,0.04)"}}>
        {/* Brand */}
        <div style={{padding:"22px 16px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{width:36,height:36,background:"linear-gradient(135deg,#b45309,#f59e0b)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 3px 10px rgba(180,83,9,0.45)"}}>
              <span style={{fontSize:17,fontWeight:900,color:"#fff",fontFamily:"Georgia,serif",letterSpacing:"-0.03em"}}>L</span>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",letterSpacing:"0.01em",lineHeight:1.3}}>LQC Logistics</div>
              <div style={{fontSize:10,color:"#3d5070",marginTop:1}}>Shipping Command</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}>
            <span style={{width:5,height:5,background:syncErr?"#f87171":"#10b981",borderRadius:"50%",display:"inline-block",flexShrink:0}}/>
            <span style={{color:syncErr?"#f87171":"#3d5070"}}>{syncErr?"Sync error":(lastSync?"Live · "+lastSync.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}):"Connecting…")}</span>
          </div>
        </div>
        {/* Bell */}
        <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <button onClick={()=>setBellOpen(o=>!o)} className="nav-item"
            style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,width:"100%",padding:"8px 10px",border:"none",borderRadius:8,
              background:alerts.length>0?(criticalCount>0?"rgba(239,68,68,0.12)":"rgba(245,158,11,0.1)"):"rgba(255,255,255,0.04)",
              cursor:"pointer",color:alerts.length>0?(criticalCount>0?"#fca5a5":"#fcd34d"):"#4a6080"}}>
            <span style={{display:"flex",alignItems:"center",gap:7,fontSize:12,fontWeight:500}}>
              <span style={{fontSize:13}}>🔔</span> Alerts
              {criticalCount>0&&<span style={{fontSize:10,color:"#fca5a5",fontWeight:400}}>· {criticalCount} critical</span>}
            </span>
            {alerts.length>0&&<span style={{background:criticalCount>0?"#dc2626":"#d97706",color:"#fff",fontSize:10,fontWeight:700,borderRadius:10,padding:"1px 7px",lineHeight:"17px"}}>{alerts.length}</span>}
          </button>
        </div>
        {/* Navigation */}
        <nav style={{flex:1,padding:"8px 12px 8px",overflowY:"auto"}}>
          {[
            {label:"Operations",items:["Dashboard","Shipments","SKU Search"]},
            {label:"Planning",items:["Timeline","Calendar","Alerts"]},
            {label:"Intelligence",items:["Analytics"]},
            {label:"Configuration",items:["Item Setup","Locations","Manage"]},
          ].map(({label,items})=>(
            <div key={label} style={{marginBottom:4}}>
              <div style={{fontSize:9,fontWeight:700,color:"#253347",textTransform:"uppercase",letterSpacing:".1em",padding:"10px 8px 4px"}}>{label}</div>
              {items.map(t=>{
                const isActive=tab===t;
                return(
                  <button key={t} onClick={()=>{setTab(t);setBellOpen(false);}} className="nav-item"
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",textAlign:"left",
                      padding:"7px 10px",
                      background:isActive?"rgba(96,165,250,0.13)":"transparent",
                      color:isActive?"#93c5fd":"#4a6080",
                      border:"none",
                      borderLeft:isActive?"2.5px solid #60a5fa":"2.5px solid transparent",
                      cursor:"pointer",fontSize:12.5,fontWeight:isActive?600:400,
                      borderRadius:"0 8px 8px 0",marginBottom:1,marginLeft:-2}}>
                    <span>{t}</span>
                    {t==="Alerts"&&alerts.length>0&&<span style={{fontSize:9,background:"rgba(220,38,38,0.2)",color:"#fca5a5",borderRadius:10,padding:"1px 6px"}}>{alerts.length}</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        {/* Footer */}
        <div style={{padding:"12px 12px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
          <button onClick={loadData} disabled={loading||syncing} className="nav-item"
            style={{fontSize:11,padding:"7px 10px",border:"1px solid rgba(255,255,255,0.07)",borderRadius:8,background:"transparent",cursor:"pointer",color:"#3d5070",width:"100%",marginBottom:8,textAlign:"left"}}>
            {loading?"Loading…":syncing?"Saving…":"↻  Refresh data"}
          </button>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10,color:"#253347"}}>{data.length} shipments</span>
            <button onClick={()=>{localStorage.removeItem("lqc_auth");setAuthed(false);}} style={{fontSize:10,background:"transparent",border:"none",cursor:"pointer",color:"#253347",padding:0}}>Sign out</button>
          </div>
        </div>
      </div>

      {/* Bell dropdown */}
      {bellOpen&&(
        <div style={{position:"fixed",left:220,top:0,width:380,maxHeight:500,overflowY:"auto",background:V.bg,border:`1px solid ${V.border}`,borderRadius:"0 0 14px 14px",zIndex:200,boxShadow:"0 12px 40px rgba(15,23,42,0.18)"}}>
          <div style={{padding:"10px 14px",borderBottom:`0.5px solid ${V.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:500}}>Active alerts ({alerts.length})</span>
            <div style={{display:"flex",gap:8}}>
              {alerts.length>0&&<button onClick={dismissAll} style={{fontSize:11,padding:"3px 8px",border:`0.5px solid ${V.border2}`,borderRadius:4,background:"transparent",cursor:"pointer",color:V.text2}}>Dismiss all</button>}
              <button onClick={()=>setBellOpen(false)} style={{fontSize:16,border:"none",background:"transparent",cursor:"pointer",color:V.text2}}>×</button>
            </div>
          </div>
          {alerts.slice(0,8).map(a=>{const m=ALERT_META[a.type];return(
            <div key={a.id} style={{padding:"10px 14px",borderBottom:`0.5px solid ${V.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                <div>
                  <div style={{fontSize:11,color:m.color,fontWeight:500,marginBottom:2}}>{m.icon} {m.label}</div>
                  <div style={{fontSize:12,fontWeight:500}}>{a.customer} — <span style={{fontWeight:400,color:V.text2}}>{a.po}</span></div>
                  <div style={{fontSize:11,color:V.text2}}>{a.message}</div>
                </div>
                <button onClick={()=>dismiss(a.id)} style={{fontSize:14,border:"none",background:"transparent",cursor:"pointer",color:V.text2,flexShrink:0}}>×</button>
              </div>
            </div>
          );})}
          {alerts.length===0&&<div style={{padding:24,textAlign:"center",fontSize:13,color:V.text2}}>No active alerts</div>}
        </div>
      )}

      {/* Content */}
      <div style={{flex:1,overflow:"auto"}} onClick={()=>bellOpen&&setBellOpen(false)}>
        {loading&&data.length===0&&<LoadingScreen/>}
        {(!loading||data.length>0)&&<>
          {tab==="Dashboard"&&<Dashboard data={data} alerts={alerts} setTab={setTab} itemSetup={itemSetup} setEditRow={setEditRow}/>}
          {tab==="Shipments"&&<Shipments data={data} alerts={alerts} quickStatus={quickStatus} setEditRow={setEditRow} selected={selected} toggleSelect={toggleSelect} toggleAll={toggleAll} bulkStatus={bulkStatus} setBulkStatus={setBulkStatus} applyBulk={applyBulk} syncing={syncing} itemSetup={itemSetup}/>}
          {tab==="SKU Search"&&<SKUSearch data={data} alerts={alerts} itemSetup={itemSetup}/>}
          {tab==="Timeline"&&<Timeline data={data} alerts={alerts}/>}
          {tab==="Calendar"&&<Calendar data={data} calMonth={calMonth} setCalMonth={setCalMonth} alerts={alerts}/>}
          {tab==="Alerts"&&<AlertsTab alerts={alerts.filter(a=>alertTypeFilter==="All"||a.type===alertTypeFilter)} allAlerts={alerts} typeFilter={alertTypeFilter} setTypeFilter={setAlertTypeFilter} dismiss={dismiss} dismissAll={dismissAll} dismissed={dismissed} saveDismissed={saveDismissed}/>}
          {tab==="Analytics"&&<Analytics data={data} itemSetup={itemSetup}/>}
          {tab==="Item Setup"&&<ItemSetup skuCatalog={skuCatalog} itemSetup={itemSetup} saveItemSetup={saveItemSetup} syncing={itemSetupSyncing}/>}
          {tab==="Locations"&&<LocationSetup locations={locations} saveLocations={saveLocations} data={data}/>}
          {tab==="Manage"&&<Manage data={data} saveRow={saveRow} deleteRow={deleteRow} syncing={syncing} skuCatalog={skuCatalog} locations={locations}/>}
        </>}
      </div>

      {editRow&&<EditModal row={editRow} onSave={async(r)=>{await saveRow(r);setEditRow(null);}} onClose={()=>setEditRow(null)} syncing={syncing} skuCatalog={skuCatalog} itemSetup={itemSetup} locations={locations}/>}
      {syncing&&<div style={{position:"fixed",bottom:20,right:20,background:"#0f172a",color:"#f1f5f9",fontSize:12,padding:"10px 18px",borderRadius:12,fontWeight:500,zIndex:9999,boxShadow:"0 6px 24px rgba(0,0,0,.3)",display:"flex",alignItems:"center",gap:9,border:"1px solid rgba(255,255,255,0.07)"}}>
        <span style={{width:7,height:7,background:"#f59e0b",borderRadius:"50%",display:"inline-block",flexShrink:0}}/>
        Saving to Google Sheet…
      </div>}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────
function Dashboard({data,alerts,setTab,itemSetup,setEditRow}){
  itemSetup=itemSetup||{};
  const [drill,setDrill]=useState(null);
  const num=v=>{const n=Number(String(v??"").replace(/[^0-9.-]/g,""));return Number.isFinite(n)?n:0;};
  const active=useMemo(()=>data.filter(r=>r["Status"]!=="Delivered"),[data]);
  const inTransit=useMemo(()=>data.filter(r=>r["Status"]==="In Transit"),[data]);
  const arriving7=useMemo(()=>data.filter(r=>{const d=parseDate(r["ETA"]);return d&&daysDiff(d)>=0&&daysDiff(d)<=7;}),[data]);
  const crit=alerts.filter(a=>a.severity==="critical").length;
  const alertPoSet=new Set(alerts.map(a=>a.po));
  const fin=useMemo(()=>{
    let pc=0,cc=0,dr=0;
    active.forEach(r=>{
      cc+=num(r["Container Cost"]);dr+=num(r["Drayage"]);
      (Array.isArray(r["SKUs"])?r["SKUs"]:[]).forEach(s=>{pc+=num(s.qty)*Number(itemSetup[s.sku]?.cost||0);});
    });
    return{productCost:pc,containerCost:cc,drayage:dr,total:pc+cc+dr};
  },[active,itemSetup]);
  const fmt$=v=>v>=1000000?`$${(v/1000000).toFixed(1)}M`:v>=1000?`$${(v/1000).toFixed(0)}k`:`$${Math.round(v).toLocaleString()}`;
  const upcoming=useMemo(()=>data.filter(r=>{const d=parseDate(r["ETA"]);return d&&daysDiff(d)>=0&&daysDiff(d)<=21;}).sort((a,b)=>new Date(a["ETA"])-new Date(b["ETA"])).slice(0,15),[data]);
  const cards=[
    {key:"active",label:"Active Orders",value:active.length,sub:`${data.filter(r=>r["Status"]==="Delivered").length} delivered`,color:"#b45309"},
    {key:"transit",label:"In Transit",value:inTransit.length,sub:"On the water now",color:"#7c3aed"},
    {key:"arriving",label:"Arriving ≤ 7 Days",value:arriving7.length,sub:"ETA this week",color:"#0e7490"},
    {key:"alerts",label:"Active Alerts",value:alerts.length,sub:crit>0?`${crit} critical`:"All clear",color:crit>0?"#dc2626":"#059669"},
    {key:"financial",label:"Value In-Flight",value:fmt$(fin.productCost),sub:"Product cost · active orders",color:"#059669"},
  ];
  return(
    <div style={{padding:24}}>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Operations</div>
        <div style={{fontSize:26,fontWeight:800,color:V.text,letterSpacing:"-0.03em",lineHeight:1}}>Dashboard</div>
        <div style={{fontSize:12,color:V.text2,marginTop:6}}>{data.length} total shipments · {active.length} active · {data.filter(r=>r["Status"]==="Delivered").length} delivered</div>
      </div>
      {/* KPI CARDS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:20}}>
        {cards.map(c=>{
          const isOpen=drill===c.key;
          return(
            <div key={c.key} onClick={()=>setDrill(isOpen?null:c.key)} className="kpi-card"
              style={{
                background:isOpen?`linear-gradient(145deg,#fff,${c.color}10)`:`linear-gradient(145deg,#fff,${c.color}06)`,
                borderRadius:16,padding:"20px 20px 18px",cursor:"pointer",position:"relative",overflow:"hidden",
                border:`1px solid ${isOpen?c.color+"50":V.border}`,
                boxShadow:isOpen?`0 0 0 3px ${c.color}14,0 8px 28px ${c.color}16`:`0 1px 3px rgba(15,23,42,0.07),0 4px 14px rgba(15,23,42,0.04)`}}>
              <div style={{position:"absolute",top:14,right:14,width:7,height:7,borderRadius:"50%",background:c.color,opacity:isOpen?1:0.3,transition:"opacity 0.15s"}}/>
              <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:14,paddingRight:16}}>{c.label}</div>
              <div style={{fontSize:34,fontWeight:800,color:c.color,lineHeight:1,marginBottom:8,letterSpacing:"-0.03em"}}>{c.value}</div>
              <div style={{fontSize:11,color:V.text2}}>{c.sub}</div>
              {isOpen&&<div style={{position:"absolute",bottom:12,right:14,fontSize:9,color:c.color,fontWeight:700}}>▲ close</div>}
            </div>
          );
        })}
      </div>
      {/* DRILL-DOWN */}
      {drill&&(
        <div style={{background:V.bg,border:`1px solid ${V.border}`,borderRadius:14,padding:20,marginBottom:20,boxShadow:"0 4px 24px rgba(0,0,0,.08)"}}>
          <DashDrill drill={drill} active={active} inTransit={inTransit} arriving7={arriving7} alerts={alerts} alertPoSet={alertPoSet} fin={fin} itemSetup={itemSetup} num={num} setTab={setTab} onClose={()=>setDrill(null)}/>
        </div>
      )}
      {/* FINANCIAL SNAPSHOT */}
      <div style={{marginBottom:20}}>
        <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Financial Snapshot — Active Orders</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {[{l:"Product Cost",v:fmt$(fin.productCost),c:"#10b981",n:`${active.length} active orders`},{l:"Container Cost",v:fmt$(fin.containerCost),c:"#f97316",n:"Direct freight"},{l:"Drayage",v:fmt$(fin.drayage),c:"#8b5cf6",n:"Port to warehouse"},{l:"Total In-Flight",v:fmt$(fin.total),c:"#3b82f6",n:"All cost components"}].map(f=>(
            <div key={f.l} className="stat-card" style={{background:`linear-gradient(145deg,#fff,${f.c}07)`,border:`1px solid ${V.border}`,borderRadius:14,padding:"16px 18px",boxShadow:"0 1px 4px rgba(15,23,42,0.07)",position:"relative",overflow:"hidden",transition:"box-shadow 0.15s"}}>
              <div style={{position:"absolute",top:13,right:13,width:6,height:6,borderRadius:"50%",background:f.c,opacity:0.4}}/>
              <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:10}}>{f.l}</div>
              <div style={{fontSize:24,fontWeight:700,color:f.c,marginBottom:4,letterSpacing:"-0.02em"}}>{f.v}</div>
              <div style={{fontSize:11,color:V.text2}}>{f.n}</div>
            </div>
          ))}
        </div>
      </div>
      {/* ALERTS BANNER */}
      {alerts.length>0&&(
        <div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:14,padding:"14px 20px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 2px 12px rgba(220,38,38,.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,background:"#fee2e2",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontSize:16}}>⛔</span>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#991b1b"}}>{crit} critical alert{crit!==1?"s":""} require attention</div>
              <div style={{fontSize:11,color:"#ef4444",marginTop:1}}>{alerts.length-crit} additional warning{alerts.length-crit!==1?"s":""} active</div>
            </div>
          </div>
          <button onClick={()=>setTab("Alerts")} style={{fontSize:12,padding:"7px 18px",border:"1px solid #fca5a5",borderRadius:9,background:"#ffffff",cursor:"pointer",color:"#991b1b",fontWeight:600,boxShadow:"0 1px 4px rgba(220,38,38,.1)"}}>View all →</button>
        </div>
      )}
      {/* UPCOMING ARRIVALS */}
      <div>
        <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:12}}>Arrivals — Next 21 Days ({upcoming.length})</div>
        {upcoming.length===0&&<div style={{background:V.bg,border:`1px solid ${V.border}`,borderRadius:12,padding:24,textAlign:"center",fontSize:13,color:V.text2,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>No arrivals in the next 21 days</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10}}>
          {upcoming.map(r=>{
            const d=daysDiff(parseDate(r["ETA"]));const ha=alertPoSet.has(r["LQC PO#"]);
            const urgent=d<=3;const loc=r["Landing Location"]||r["Destination"]||r["POD"]||"—";
            const isInternal=INTERNAL_LOCS.has(loc)||WAREHOUSE_LOCATIONS.slice(0,4).some(w=>loc.toLowerCase().includes(w.toLowerCase().split(" ")[0]));
            return(
              <div key={r["LQC PO#"]} onClick={setEditRow?()=>setEditRow(r):undefined} className="arrival-card" style={{background:V.bg,borderRadius:14,padding:"14px 16px",cursor:setEditRow?"pointer":"default",
                border:`1px solid ${ha?"#fbbf24":urgent?"#fed7aa":V.border}`,
                borderTop:`3px solid ${urgent?"#ef4444":d<=7?"#f97316":"#c8d0dc"}`,
                boxShadow:"0 1px 4px rgba(15,23,42,0.07)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                  <div style={{fontSize:13,fontWeight:700,color:V.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,marginRight:6}}>{r["Customer"]||"—"}{ha&&<span style={{marginLeft:4,fontSize:10,color:"#b45309"}}>⚠</span>}</div>
                  <span style={{fontSize:11,fontWeight:800,color:urgent?"#ef4444":d<=7?"#f97316":"#64748b",whiteSpace:"nowrap",flexShrink:0}}>{d===0?"Today":d===1?"Tmrw":`${d}d`}</span>
                </div>
                <div style={{fontSize:10,color:V.text2,marginBottom:6,fontFamily:"monospace"}}>{r["LQC PO#"]}</div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  {isInternal&&<span style={{fontSize:9,background:"rgba(14,116,144,.12)",color:"#0e7490",borderRadius:3,padding:"1px 5px",fontWeight:700,flexShrink:0}}>WH</span>}
                  <span style={{fontSize:11,color:V.text2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{loc}</span>
                </div>
                <div style={{fontSize:10,color:V.text2,marginTop:4}}>ETA {fmtDate(r["ETA"])}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const col={display:"grid",gap:10,padding:"8px 12px",fontSize:12,borderBottom:`0.5px solid ${V.border}`,alignItems:"center"};
  const hd={...col,fontSize:10,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".05em",background:V.bg3,borderRadius:"8px 8px 0 0",border:"none",borderBottom:`0.5px solid ${V.border}`};

              <span style={{fontSize:18,flexShrink:0}}>{m.icon}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,alignItems:"baseline",flexWrap:"wrap"}}>

                <div style={{fontSize:11,color:V.text2,marginTop:2}}>{a.message}</div>

          );})}
          {alerts.length===0&&<div style={{padding:24,textAlign:"center",fontSize:13,color:V.text2}}>No active alerts</div>}
        </div>
      )}
      {drill==="financial"&&(
        <div style={{overflowX:"auto"}}>
          <div style={{...hd,gridTemplateColumns:cols}}><span>PO / Customer</span><span>Landing Location</span><span>Status</span><span>Product Cost</span><span>Container+Dray</span></div>
          {rows.map((r,i)=>{
            const skus=Array.isArray(r["SKUs"])?r["SKUs"]:[];
            const pc=skus.reduce((s,sk)=>s+num(sk.qty)*Number(itemSetup[sk.sku]?.cost||0),0);
            const cc=num(r["Container Cost"]),dr=num(r["Drayage"]);
            const loc=r["Landing Location"]||r["Destination"]||r["POD"]||"—";
            return(
              <div key={i} style={{...col,gridTemplateColumns:cols,background:i%2===0?V.bg:"rgba(0,0,0,.012)"}}>

                <div style={{fontWeight:700,color:pc>0?"#059669":V.text2}}>{pc>0?`$${Math.round(pc).toLocaleString()}`:"—"}</div>
                <div style={{color:(cc+dr)>0?"#f97316":V.text2,fontWeight:(cc+dr)>0?600:400}}>{(cc+dr)>0?`$${Math.round(cc+dr).toLocaleString()}`:"—"}</div>

          })}
          {rows.length===0&&<div style={{padding:24,textAlign:"center",fontSize:13,color:V.text2}}>No active orders</div>}

            const eta=parseDate(r["ETA"]);const d=daysDiff(eta);const ha=alertPoSet.has(r["LQC PO#"]);
            const loc=r["Landing Location"]||r["Destination"]||r["POD"]||"—";

              <div key={i} style={{...col,gridTemplateColumns:cols,background:ha?"rgba(251,191,36,.06)":i%2===0?V.bg:"rgba(0,0,0,.012)"}}>

                <div style={{display:"flex",alignItems:"center",gap:4}}>{INTERNAL_LOCS.has(loc)&&<span style={{fontSize:9,background:"rgba(14,116,144,.12)",color:"#0e7490",borderRadius:3,padding:"1px 4px",fontWeight:700,flexShrink:0}}>WH</span>}<span style={{fontSize:11,color:V.text2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{loc}</span></div>
                <div style={{fontWeight:500,color:d!==null&&d<0?"#dc2626":d!==null&&d<=3?"#ea580c":V.text}}>{fmtDate(r["ETA"])}{d!==null&&<div style={{fontSize:10,color:V.text2}}>{d===0?"today":d===1?"tomorrow":d<0?`${Math.abs(d)}d overdue`:`in ${d}d`}</div>}</div>
                <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:`${STATUS_COLORS[r["Status"]]}18`,color:STATUS_COLORS[r["Status"]],fontWeight:600,alignSelf:"flex-start"}}>{r["Status"]}</span>
                <div style={{fontSize:11,color:V.text2}}>{r["Agent"]||"—"}</div>
              </div>
            );
          })}
          {rows.length===0&&<div style={{padding:24,textAlign:"center",fontSize:13,color:V.text2}}>No shipments in this category</div>}
        </div>
      )}
    </div>
  );
}

// ─── SHIPMENTS ────────────────────────────────────────────
function Shipments({data,alerts,quickStatus,setEditRow,selected,toggleSelect,toggleAll,bulkStatus,setBulkStatus,applyBulk,syncing,itemSetup}){
  itemSetup=itemSetup||{};
  const [search,setSearch]=useState("");
  const [fStatus,setFStatus]=useState("All");
  const [fCustomer,setFCustomer]=useState("All");
  const [fModel,setFModel]=useState("All");
  const [fAgent,setFAgent]=useState("All");
  const [expanded,setExpanded]=useState(null);
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState("asc");
  const [showArchived,setShowArchived]=useState(false);
  const customers=["All",...new Set(data.map(r=>r["Customer"]).filter(Boolean))].sort();
  const agents=["All",...new Set(data.map(r=>r["Agent"]).filter(Boolean))].sort();
  const alertPoSet=new Set(alerts.map(a=>a.po));
  const filtered=useMemo(()=>data.filter(r=>{
    if(fStatus!=="All"&&r["Status"]!==fStatus)return false;
    if(fCustomer!=="All"&&r["Customer"]!==fCustomer)return false;
    if(fModel!=="All"&&r["Shipping Model"]!==fModel)return false;
    if(fAgent!=="All"&&r["Agent"]!==fAgent)return false;
    if(search){const q=search.toLowerCase();const skus=Array.isArray(r["SKUs"])?r["SKUs"].map(s=>s.sku).join(" "):String(r["SKUs"]||"");return[r["LQC PO#"],r["Customer"],r["Customer PO"],r["Destination"],r["POD"],r["Container #"],r["BOL #"],skus].some(v=>String(v||"").toLowerCase().includes(q));}
    return true;
  }),[data,fStatus,fCustomer,fModel,fAgent,search]);
  const SHIP_SORT_KEYS={"LQC PO#":"LQC PO#","Customer":"Customer","Cust. PO":"Customer PO","ETD":"ETD","ETA":"ETA","Destination":"Destination","Agent":"Agent","Model":"Shipping Model","Status":"Status"};
  const sorted=useMemo(()=>{
    if(!sortCol)return filtered;
    return [...filtered].sort((a,b)=>{
      const key=SHIP_SORT_KEYS[sortCol]||sortCol;
      if(sortCol==="ETD"||sortCol==="ETA"){const ad=parseDate(a[key]),bd=parseDate(b[key]);if(!ad&&!bd)return 0;if(!ad)return sortDir==="asc"?1:-1;if(!bd)return sortDir==="asc"?-1:1;return sortDir==="asc"?ad-bd:bd-ad;}
      const av=String(a[key]||"").toLowerCase(),bv=String(b[key]||"").toLowerCase();
      return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    });
  },[filtered,sortCol,sortDir]);
  function toggleSort(col){if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}}
  const deliveredCount=sorted.filter(r=>r["Status"]==="Delivered").length;
  const displayed=(!showArchived&&fStatus==="All")?sorted.filter(r=>r["Status"]!=="Delivered"):sorted;
  const sel={fontSize:12,padding:"6px 10px",border:`1px solid ${V.border}`,borderRadius:8,background:V.bg,color:V.text};
  return(
    <div style={{padding:24}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Operations</div>
        <div style={{fontSize:26,fontWeight:800,color:V.text,letterSpacing:"-0.03em",lineHeight:1}}>Shipments</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search PO, customer, SKU, container, BOL…" style={{flex:1,minWidth:200,fontSize:13,padding:"8px 12px",border:`1px solid ${V.border}`,borderRadius:9,background:V.bg,color:V.text,boxShadow:"0 1px 3px rgba(15,23,42,0.06)"}}/>
        <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={sel}><option>All</option>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
        <select value={fCustomer} onChange={e=>setFCustomer(e.target.value)} style={sel}>{customers.map(s=><option key={s}>{s}</option>)}</select>
        <select value={fModel} onChange={e=>setFModel(e.target.value)} style={sel}>{["All","Direct to Client","US Warehouse","Port Pickup"].map(s=><option key={s}>{s}</option>)}</select>
        <select value={fAgent} onChange={e=>setFAgent(e.target.value)} style={sel}>{agents.map(s=><option key={s}>{s}</option>)}</select>
        <span style={{fontSize:12,color:V.text2}}>{displayed.length}{!showArchived&&deliveredCount>0&&fStatus==="All"?` of ${filtered.length}`:""} results</span>
        {fStatus==="All"&&deliveredCount>0&&(
          <button onClick={()=>setShowArchived(a=>!a)} style={{fontSize:12,padding:"5px 10px",border:`0.5px solid ${showArchived?"#b45309":V.border2}`,borderRadius:6,background:showArchived?"rgba(180,87,9,.08)":"transparent",cursor:"pointer",color:showArchived?"#b45309":V.text2,whiteSpace:"nowrap"}}>
            {showArchived?"Hide Archived":"📦 Show Archived"} ({deliveredCount})
          </button>
        )}
      </div>
      {selected.size>0&&(
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"#eff6ff",border:"0.5px solid #93c5fd",borderRadius:8,marginBottom:10}}>
          <span style={{fontSize:12,fontWeight:500,color:"#1d4ed8"}}>{selected.size} selected</span>
          <select value={bulkStatus} onChange={e=>setBulkStatus(e.target.value)} style={{...sel,fontSize:12}}><option value="">Set status…</option>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
          <button onClick={applyBulk} disabled={!bulkStatus||syncing} style={{fontSize:12,padding:"4px 12px",border:"none",borderRadius:4,background:bulkStatus?"#1d4ed8":"#93c5fd",color:"#fff",cursor:bulkStatus?"pointer":"default"}}>{syncing?"Saving…":"Apply"}</button>
          <button onClick={()=>toggleAll([])} style={{fontSize:12,padding:"4px 10px",border:"0.5px solid #93c5fd",borderRadius:4,background:"transparent",cursor:"pointer",color:"#1d4ed8"}}>Clear</button>
        </div>
      )}
      <div style={{border:`1px solid ${V.border}`,borderRadius:14,overflow:"hidden",background:V.bg,boxShadow:"0 1px 6px rgba(15,23,42,0.06)"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
            <thead>
              <tr style={{background:V.bg3,fontSize:11,color:V.text2}}>
                <th style={{padding:"8px 8px",width:32}}><input type="checkbox" onChange={()=>toggleAll(filtered)} checked={selected.size===filtered.length&&filtered.length>0} style={{cursor:"pointer"}}/></th>
                {["LQC PO#","Customer","Cust. PO","ETD","ETA","Destination","Agent","Model","Status",""].map((h,i)=>{
                  const sortable=h&&SHIP_SORT_KEYS[h];
                  const active=sortCol===h;
                  return(
                    <th key={i} onClick={sortable?()=>toggleSort(h):undefined}
                      style={{padding:"8px 8px",textAlign:"left",fontWeight:500,borderBottom:`0.5px solid ${V.border}`,cursor:sortable?"pointer":"default",userSelect:"none",whiteSpace:"nowrap",color:active?"#b45309":V.text2}}>
                      {h}{active?(sortDir==="asc"?" ↑":" ↓"):(sortable?" ⇅":"")}
                    </th>
                  );
                })}
                <th style={{padding:"8px 8px",width:52}}></th>
              </tr>
            </thead>
            <tbody>
              {displayed.map((r,i)=>{
                const po=r["LQC PO#"];
                const isExp=expanded===po;
                const eta=parseDate(r["ETA"]);
                const ha=alertPoSet.has(po);
                const etaColor=eta&&r["Status"]==="In Transit"?(daysDiff(eta)<0?"#dc2626":daysDiff(eta)<=3?"#b45309":V.text):V.text;
                const skus=Array.isArray(r["SKUs"])?r["SKUs"]:[];
                return(
                  <React.Fragment key={po}>
                    <tr className="tbl-row" style={{borderBottom:`1px solid ${V.border}`,background:isExp?V.bg2:ha?"rgba(251,191,36,.05)":V.bg}}>
                      <td style={{padding:"6px 8px"}} onClick={e=>e.stopPropagation()}><input type="checkbox" checked={selected.has(po)} onChange={()=>toggleSelect(po)} style={{cursor:"pointer"}}/></td>
                      <td style={{padding:"6px 8px",fontSize:12,fontWeight:500,whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}>{ha&&<span style={{marginRight:3,fontSize:10}}>⚠</span>}{po}</td>
                      <td style={{padding:"6px 8px",fontSize:12,whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}>{r["Customer"]}</td>
                      <td style={{padding:"6px 8px",fontSize:12,color:V.text2,whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}>{r["Customer PO"]||"—"}</td>
                      <td style={{padding:"6px 8px",fontSize:12,whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}>{fmtDate(r["ETD"])}</td>
                      <td style={{padding:"6px 8px",fontSize:12,color:etaColor,fontWeight:eta&&daysDiff(eta)<0&&r["Status"]==="In Transit"?500:400,whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}>{fmtDate(r["ETA"])}</td>
                      <td style={{padding:"6px 8px",fontSize:12,color:V.text2,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}>{r["Destination"]||r["POD"]||"—"}</td>
                      <td style={{padding:"6px 8px",fontSize:12,color:V.text2,whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}>{r["Agent"]||"—"}</td>
                      <td style={{padding:"6px 8px",fontSize:11,cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:po)}><span style={{background:`${MODEL_COLORS[r["Shipping Model"]]||"#64748b"}22`,color:MODEL_COLORS[r["Shipping Model"]]||"#64748b",padding:"2px 5px",borderRadius:4,whiteSpace:"nowrap",fontSize:10}}>{r["Shipping Model"]}</span></td>
                      <td style={{padding:"4px 6px"}} onClick={e=>e.stopPropagation()}>
                        <select value={r["Status"]} onChange={e=>quickStatus(po,e.target.value)} style={{fontSize:11,padding:"3px 4px",border:`0.5px solid ${V.border2}`,borderRadius:4,background:V.bg,color:STATUS_COLORS[r["Status"]]||V.text,cursor:"pointer",maxWidth:110}}>
                          {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                        </select>
                      </td>
                      <td style={{padding:"4px 6px",textAlign:"center"}} onClick={e=>e.stopPropagation()}>
                        <button onClick={()=>setEditRow(r)} style={{fontSize:11,padding:"5px 11px",border:`1px solid ${V.border2}`,borderRadius:7,background:"transparent",cursor:"pointer",color:V.text2,fontWeight:500}}>Edit</button>
                      </td>
                    </tr>
                    {isExp&&(
                      <tr key={po+"_exp"}>
                        <td colSpan={12} style={{padding:"12px 16px",background:V.bg2,borderBottom:`0.5px solid ${V.border}`}}>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
                            {[["Container #",r["Container #"]],["BOL #",r["BOL #"]],["O/F",r["O/F"]],["Containers",r["Container Qty"]&&r["Container Size"]?`${r["Container Qty"]} × ${r["Container Size"]}`:(r["Container Qty"]||r["Container Size"]||"—")],["Volume (CBM)",r["Volume"]||"—"],["Landing Location",r["Landing Location"]||"—"],["MABD",fmtDate(r["MABD"])],["Invoice #",r["Invoice #"]],["POD",r["POD"]],["Container Cost",r["Container Cost"]?`$${Number(r["Container Cost"]).toLocaleString(undefined,{maximumFractionDigits:0})}`:"—"],["Drayage",r["Drayage"]?`$${Number(r["Drayage"]).toLocaleString(undefined,{maximumFractionDigits:0})}`:"—"],["Note",r["Note"]]].map(([l,v])=>(
                              <div key={l}><div style={{fontSize:10,color:V.text2}}>{l}</div><div style={{fontSize:12}}>{v||"—"}</div></div>
                            ))}
                          </div>
                          <div style={{fontSize:11,fontWeight:500,color:V.text2,marginBottom:5}}>SKUs ({skus.length})</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:12,padding:"3px 0",fontSize:10,color:V.text2,borderBottom:`0.5px solid ${V.border}`,marginBottom:2}}>
                            <span>Product</span><span style={{textAlign:"right"}}>Qty</span><span style={{textAlign:"right",minWidth:80}}>Cost/Unit</span><span style={{textAlign:"right",minWidth:80}}>Line Total</span>
                          </div>
                          {skus.map((s,si)=>{
                            const costPer=Number(itemSetup[s.sku]?.cost||0);
                            const lineTotal=costPer*Number(s.qty||0);
                            return(
                              <div key={si} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:12,fontSize:12,padding:"4px 0",borderBottom:`0.5px solid ${V.border}`,alignItems:"center"}}>
                                <span style={{fontWeight:500}}>{s.sku}</span>
                                <span style={{color:V.text2,whiteSpace:"nowrap",textAlign:"right"}}>{Number(s.qty||0).toLocaleString()} {s.unit}</span>
                                <span style={{color:costPer>0?V.text:V.text2,whiteSpace:"nowrap",textAlign:"right",minWidth:80}}>{costPer>0?`$${costPer.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`:"—"}</span>
                                <span style={{fontWeight:costPer>0?600:400,color:costPer>0?"#059669":V.text2,whiteSpace:"nowrap",textAlign:"right",minWidth:80}}>{costPer>0?`$${lineTotal.toLocaleString(undefined,{maximumFractionDigits:0})}`:"—"}</span>
                              </div>
                            );
                          })}
                          {(()=>{
                            const poProductCost=skus.reduce((sum,s)=>sum+Number(itemSetup[s.sku]?.cost||0)*Number(s.qty||0),0);
                            const containerCost=Number(r["Container Cost"]||0);
                            const drayage=Number(r["Drayage"]||0);
                            if(poProductCost===0&&containerCost===0&&drayage===0)return null;
                            return(<div style={{display:"flex",gap:16,justifyContent:"flex-end",marginTop:8,paddingTop:8,borderTop:`0.5px solid ${V.border}`,fontSize:12,fontWeight:600,flexWrap:"wrap"}}>
                              {poProductCost>0&&<span style={{color:"#059669"}}>Product Cost: ${Math.round(poProductCost).toLocaleString()}</span>}
                              {containerCost>0&&<span style={{color:"#f97316"}}>Container: ${Math.round(containerCost).toLocaleString()}</span>}
                              {drayage>0&&<span style={{color:"#7c3aed"}}>Drayage: ${Math.round(drayage).toLocaleString()}</span>}
                            </div>);
                          })()}
                          <div style={{display:"flex",justifyContent:"flex-end",marginTop:12,paddingTop:10,borderTop:`0.5px solid ${V.border}`}}>
                            <button onClick={()=>setEditRow(r)} style={{fontSize:12,padding:"5px 16px",border:`0.5px solid ${V.border2}`,borderRadius:6,background:"transparent",cursor:"pointer",color:V.text2,fontWeight:500}}>✎ Edit Shipment</button>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length===0&&<div style={{padding:32,textAlign:"center",color:V.text2,fontSize:13}}>No shipments match your filters</div>}
      </div>
    </div>
  );
}

// ─── SKU SEARCH ───────────────────────────────────────────
function SKUSearch({data,alerts,itemSetup}){
  itemSetup=itemSetup||{};
  const [q,setQ]=useState("");
  const [selectedSku,setSelectedSku]=useState(null);
  const allSkus=useMemo(()=>{
    const map={};
    data.forEach(r=>{
      const skus=Array.isArray(r["SKUs"])?r["SKUs"]:[];
      skus.forEach(s=>{
        if(!s.sku)return;
        if(!map[s.sku])map[s.sku]={active:[],delivered:[],totalQty:0,activeQty:0,unit:s.unit||"units"};
        const qty=Number(s.qty||0);
        map[s.sku].totalQty+=qty;
        if(r["Status"]==="Delivered"){map[s.sku].delivered.push({...r,matchSku:s});}
        else{map[s.sku].active.push({...r,matchSku:s});map[s.sku].activeQty+=qty;}
      });
    });
    return map;
  },[data]);
  const top10=useMemo(()=>Object.entries(allSkus).sort((a,b)=>(b[1].activeQty||b[1].totalQty)-(a[1].activeQty||a[1].totalQty)).slice(0,10),[allSkus]);
  const searchResults=useMemo(()=>{
    if(!q||q.length<2)return[];
    const ql=q.toLowerCase();
    return Object.entries(allSkus).filter(([k])=>k.toLowerCase().includes(ql)).sort((a,b)=>a[0].localeCompare(b[0]));
  },[q,allSkus]);
  const list=q.length>=2?searchResults:top10;
  const inSearch=q.length>=2;
  function locSummary(delivered){
    const byLoc={};
    delivered.forEach(r=>{
      const loc=r["Landing Location"]||r["Destination"]||r["POD"]||"Unknown";
      const eta=parseDate(r["ETA"]);
      if(!byLoc[loc]||(eta&&(!parseDate(byLoc[loc]["ETA"])||eta>parseDate(byLoc[loc]["ETA"]))))byLoc[loc]=r;
    });
    return Object.entries(byLoc).sort((a,b)=>new Date(b[1]["ETA"]||0)-new Date(a[1]["ETA"]||0));
  }
  const selInfo=selectedSku?allSkus[selectedSku]:null;
  const costPer=selectedSku?Number(itemSetup[selectedSku]?.cost||0):0;
  return(
    <div style={{padding:24}}>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:20,fontWeight:700,color:V.text,letterSpacing:"-0.01em"}}>Product Lookup</div>
        <div style={{fontSize:12,color:V.text2,marginTop:4}}>{inSearch?`Searching ${Object.keys(allSkus).length} products`:"Top 10 active products — click to drill down"}</div>
      </div>
      <input value={q} onChange={e=>{setQ(e.target.value);setSelectedSku(null);}} placeholder="Search products…" autoFocus
        style={{width:"100%",fontSize:14,padding:"10px 14px",border:`1px solid ${V.border2}`,borderRadius:10,background:V.bg,color:V.text,marginBottom:20,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}/>
      <div style={{display:"grid",gridTemplateColumns:selectedSku?"300px 1fr":"1fr",gap:16,alignItems:"start"}}>
        {/* LIST */}
        <div>
          <div style={{fontSize:10,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>
            {inSearch?`Results (${list.length})`:"Top 10 Active Products"}
          </div>
          {inSearch&&list.length===0&&<div style={{fontSize:13,color:V.text2,padding:"20px 0"}}>No products found matching "{q}"</div>}
          {list.map(([name,info])=>{
            const isSel=selectedSku===name;
            return(
              <div key={name} onClick={()=>setSelectedSku(isSel?null:name)}
                style={{background:isSel?`rgba(180,87,9,.05)`:V.bg,border:`1px solid ${isSel?"#b45309":V.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",
                  boxShadow:isSel?"0 0 0 3px rgba(180,87,9,.12),0 2px 8px rgba(0,0,0,.06)":"0 1px 4px rgba(0,0,0,.05)",transition:"all 0.1s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{fontSize:13,fontWeight:700,color:isSel?"#b45309":V.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    {info.active.length>0&&<span style={{fontSize:10,background:"rgba(14,116,144,.1)",color:"#0e7490",borderRadius:4,padding:"2px 6px",fontWeight:700}}>{info.active.length} active</span>}
                    {info.delivered.length>0&&<span style={{fontSize:10,background:"rgba(55,65,81,.08)",color:"#374151",borderRadius:4,padding:"2px 6px"}}>{info.delivered.length} del.</span>}
                  </div>
                </div>
                <div style={{fontSize:11,color:V.text2,marginTop:4}}>
                  {info.activeQty>0?`${info.activeQty.toLocaleString()} active`:`${info.totalQty.toLocaleString()} total`} {info.unit}
                </div>
              </div>
            );
          })}
        </div>
        {/* DETAIL */}
        {selectedSku&&selInfo&&(
          <div style={{background:V.bg,border:`1px solid ${V.border}`,borderRadius:12,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,.07)"}}>
            <div style={{padding:"16px 20px",background:V.bg3,borderBottom:`1px solid ${V.border}`}}>
              <div style={{fontSize:17,fontWeight:800,color:V.text,marginBottom:4}}>{selectedSku}</div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:V.text2}}>{selInfo.active.length} in progress</span>
                <span style={{fontSize:11,color:V.text2}}>·</span>
                <span style={{fontSize:11,color:V.text2}}>{selInfo.delivered.length} delivered</span>
                <span style={{fontSize:11,color:V.text2}}>·</span>
                <span style={{fontSize:11,color:V.text2}}>{selInfo.totalQty.toLocaleString()} total {selInfo.unit}</span>
                {costPer>0&&<><span style={{fontSize:11,color:V.text2}}>·</span><span style={{fontSize:11,color:"#059669",fontWeight:600}}>${costPer.toFixed(2)}/unit</span></>}
              </div>
            </div>
            {/* IN PROGRESS */}
            {selInfo.active.length>0&&(
              <div style={{padding:"14px 20px",borderBottom:`1px solid ${V.border}`}}>
                <div style={{fontSize:10,fontWeight:700,color:"#0e7490",textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>In Progress — {selInfo.active.length} Shipment{selInfo.active.length!==1?"s":""}</div>
                {selInfo.active.map((r,i)=>{
                  const eta=parseDate(r["ETA"]);const d=daysDiff(eta);
                  const loc=r["Landing Location"]||r["Destination"]||r["POD"]||"—";
                  const isWH=INTERNAL_LOCS.has(loc);
                  const lineTotal=Number(r.matchSku.qty||0)*costPer;
                  return(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr",gap:10,padding:"8px 0",borderTop:i>0?`0.5px solid ${V.border}`:"none",fontSize:12,alignItems:"center"}}>
                      <div><div style={{fontWeight:700}}>{r["LQC PO#"]}</div><div style={{fontSize:11,color:V.text2}}>{r["Customer"]}</div></div>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>{isWH&&<span style={{fontSize:9,background:"rgba(14,116,144,.1)",color:"#0e7490",borderRadius:3,padding:"1px 4px",fontWeight:700,flexShrink:0}}>WH</span>}<span style={{fontSize:11,color:V.text2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{loc}</span></div>
                      <div style={{fontSize:11,fontWeight:500,color:d!==null&&d<0?"#dc2626":d!==null&&d<=3?"#ea580c":V.text}}>{fmtDate(r["ETA"])}</div>
                      <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:`${STATUS_COLORS[r["Status"]]}18`,color:STATUS_COLORS[r["Status"]],fontWeight:600,justifySelf:"start"}}>{r["Status"]}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {selInfo.active.length===0&&(
              <div style={{padding:"14px 20px",borderBottom:`1px solid ${V.border}`}}>
                <div style={{fontSize:10,fontWeight:700,color:"#0e7490",textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>In Progress</div>
                <div style={{fontSize:12,color:V.text2}}>No active shipments for this product.</div>
              </div>
            )}
            {/* RECENT BY LOCATION */}
            {(()=>{
              const locs=locSummary(selInfo.delivered);
              return(
                <div style={{padding:"14px 20px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#059669",textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>Most Recent Delivery by Location</div>
                  {locs.length===0&&<div style={{fontSize:12,color:V.text2}}>No deliveries on record.</div>}
                  {locs.map(([loc,r],i)=>{
                    const isWH=INTERNAL_LOCS.has(loc);
                    return(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 2fr 1.5fr",gap:10,padding:"8px 0",borderTop:i>0?`0.5px solid ${V.border}`:"none",fontSize:12,alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          {isWH&&<span style={{fontSize:9,background:"rgba(14,116,144,.1)",color:"#0e7490",borderRadius:3,padding:"1px 4px",fontWeight:700,flexShrink:0}}>WH</span>}
                          <span style={{fontWeight:700,color:V.text}}>{loc}</span>
                        </div>
                        <div style={{fontSize:11,color:V.text2}}>{r["LQC PO#"]} · {r["Customer"]}</div>
                        <div style={{fontSize:11,color:V.text2}}>Delivered {fmtDate(r["ETA"])}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}
      </div>
      {!inSearch&&list.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:V.text2}}><div style={{fontSize:32,marginBottom:8}}>📦</div><div style={{fontSize:13}}>No shipment data yet</div></div>}

function Calendar({data,calMonth,setCalMonth,alerts}){
  const year=calMonth.getFullYear(),month=calMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const alertEtaDays=new Set(alerts.map(a=>{const d=parseDate(a.eta);return d&&d.getFullYear()===year&&d.getMonth()===month?d.getDate():null}).filter(Boolean));
  const etdMap={},etaMap={};
  data.forEach(r=>{
    if(r["ETD"]){const d=new Date(r["ETD"]);if(d.getFullYear()===year&&d.getMonth()===month){const k=d.getDate();if(!etdMap[k])etdMap[k]=[];etdMap[k].push(r);}}
    if(r["ETA"]){const d=new Date(r["ETA"]);if(d.getFullYear()===year&&d.getMonth()===month){const k=d.getDate();if(!etaMap[k])etaMap[k]=[];etaMap[k].push(r);}}
  });

        <span style={{fontSize:16,fontWeight:500,flex:1,textAlign:"center"}}>{calMonth.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</span>
        <button onClick={()=>setCalMonth(new Date(year,month+1,1))} style={{padding:"4px 12px",border:`0.5px solid ${V.border2}`,borderRadius:6,background:"transparent",cursor:"pointer",color:V.text}}>→</button>
      </div>
      <div style={{display:"flex",gap:16,marginBottom:10,fontSize:11,flexWrap:"wrap",color:V.text2}}>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#b45309",marginRight:4}}/>ETD</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#0e7490",marginRight:4}}/>ETA</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#dc2626",marginRight:4}}/>Alert day</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>

        {cells.map((d,i)=>{
          if(!d)return<div key={`e${i}`}/>;
          const etds=etdMap[d]||[],etas=etaMap[d]||[];
          const isToday=today.getDate()===d&&today.getMonth()===month&&today.getFullYear()===year;
          const hasAlert=alertEtaDays.has(d);
          return(
            <div key={d} style={{minHeight:76,background:isToday?"rgba(180,87,9,.06)":hasAlert?"rgba(220,38,38,.04)":V.bg,border:`${hasAlert||isToday?"1px":"0.5px"} solid ${isToday?"#b45309":hasAlert?"#dc2626":V.border}`,borderRadius:8,padding:"4px 3px",position:"relative"}}>
              <div style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?"#b45309":hasAlert?"#dc2626":V.text2,marginBottom:2,textAlign:"center"}}>{d}</div>
              {etds.slice(0,2).map((r,j)=><div key={j} title={r["LQC PO#"]} style={{fontSize:9,background:"#fef3c7",color:"#78350f",borderRadius:2,padding:"1px 3px",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",borderLeft:"2px solid #b45309"}}>↑ {r["Customer"]}</div>)}
