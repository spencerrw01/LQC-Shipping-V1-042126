// ─── ANALYTICS ────────────────────────────────────────────
function Analytics({data,itemSetup}){
  itemSetup=itemSetup||{};
  const [fC,setFC]=useState("All");
  const [fA,setFA]=useState("All");
  const [fS,setFS]=useState("In-Process");
  const [df,setDF]=useState("");
  const [dt,setDT]=useState("");
  const [dateField,setDateField]=useState("ETD");
  const [chartFilters,setChartFilters]=useState({productCost:true,containerCost:true,drayage:true});
  const [drill,setDrill]=useState(null);
  const [topSkuCount,setTopSkuCount]=useState(10);

  const customers=["All",...new Set(data.map(r=>r["Customer"]).filter(Boolean))].sort();
  const agents=["All",...new Set(data.map(r=>r["Agent"]).filter(Boolean))].sort();
  const num=v=>{const n=Number(String(v??"").replace(/[^0-9.-]/g,""));return Number.isFinite(n)?n:0;};
  const $=v=>v>=1000000?`$${(v/1000000).toFixed(2)}M`:v>=1000?`$${(v/1000).toFixed(1)}k`:`$${Math.round(v).toLocaleString()}`;

  const f=useMemo(()=>data.filter(r=>{
    if(fC!=="All"&&r["Customer"]!==fC)return false;
    if(fA!=="All"&&r["Agent"]!==fA)return false;
    if(fS==="In-Process"&&r["Status"]==="Delivered")return false;
    if(fS!=="All"&&fS!=="In-Process"&&r["Status"]!==fS)return false;
    const d=parseDate(r[dateField]);
    if(df){const from=new Date(df+"T00:00:00");if(!d||d<from)return false;}
    if(dt){const to=new Date(dt+"T23:59:59");if(!d||d>to)return false;}
    return true;
  }),[data,fC,fA,fS,df,dt,dateField]);

  const metrics=useMemo(()=>{
    // Enrich each row with computed cost fields — all from real data only
    const rows=f.map(r=>{
      const skus=Array.isArray(r["SKUs"])?r["SKUs"]:[];
      const productCost=skus.reduce((s,sk)=>s+num(sk?.qty)*Number(itemSetup[(sk?.sku||"").trim()]?.cost||0),0);
      const containerCost=num(r["Container Cost"]);
      const drayage=num(r["Drayage"]);
      const landedCost=productCost+containerCost+drayage;
      const isActive=r["Status"]!=="Delivered";
      const etd=parseDate(r["ETD"]);
      const eta=parseDate(r["ETA"]);
      const transitDays=etd&&eta?Math.round((eta-etd)/86400000):null;
      const laneTarget=getLaneDays(r["POD"]);
      const onTime=transitDays!==null?transitDays<=laneTarget:null;
      const overdue=r["Status"]==="In Transit"&&eta&&eta<today;
      return{...r,_pc:productCost,_cc:containerCost,_dr:drayage,_lc:landedCost,_active:isActive,_td:transitDays,_ot:onTime,_ov:overdue};
    });

    let totalLanded=0,totalProduct=0,totalContainer=0,totalDrayage=0,openValue=0;
    const overdueRows=[],openRows=[],datedRows=[],onTimeRows=[];
    const byMonthCost={},byCustomer={},byAgent={},byStatus={},byDest={},bySku={};

    rows.forEach(r=>{
      totalLanded+=r._lc; totalProduct+=r._pc; totalContainer+=r._cc; totalDrayage+=r._dr;
      if(r._active){openValue+=r._lc;openRows.push(r);}
      if(r._ov)overdueRows.push(r);
      if(r._td!==null){datedRows.push(r);if(r._ot)onTimeRows.push(r);}

      const d=parseDate(r[dateField]);
      if(d){
        const mk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
        if(!byMonthCost[mk])byMonthCost[mk]={productCost:0,containerCost:0,drayage:0,count:0};
        byMonthCost[mk].productCost+=r._pc;
        byMonthCost[mk].containerCost+=r._cc;
        byMonthCost[mk].drayage+=r._dr;
        byMonthCost[mk].count++;
      }

      const ctrs=num(r["Container Qty"]);const cbm=num(r["Volume"]);
      const cust=r["Customer"]||"Unknown";
      if(!byCustomer[cust])byCustomer[cust]={shipments:0,containers:0,cbm:0,productCost:0,containerCost:0,drayage:0,landedCost:0,rows:[]};
      byCustomer[cust].shipments++;byCustomer[cust].containers+=ctrs;byCustomer[cust].cbm+=cbm;byCustomer[cust].productCost+=r._pc;byCustomer[cust].containerCost+=r._cc;byCustomer[cust].drayage+=r._dr;byCustomer[cust].landedCost+=r._lc;byCustomer[cust].rows.push(r);

      const ag=r["Agent"]||"Unassigned";
      if(!byAgent[ag])byAgent[ag]={shipments:0,onTimeCt:0,dated:0,transitTotal:0,rows:[]};
      byAgent[ag].shipments++;byAgent[ag].rows.push(r);
      if(r._td!==null){byAgent[ag].dated++;byAgent[ag].transitTotal+=r._td;if(r._ot)byAgent[ag].onTimeCt++;}

      const st=r["Status"]||"Unknown";
      if(!byStatus[st])byStatus[st]={count:0,rows:[]};
      byStatus[st].count++;byStatus[st].rows.push(r);

      const dest=r["Landing Location"]||r["Destination"]||"Unknown";
      if(!byDest[dest])byDest[dest]={shipments:0,containers:0,cbm:0,productCost:0,containerCost:0,drayage:0,landedCost:0,rows:[]};
      byDest[dest].shipments++;byDest[dest].containers+=ctrs;byDest[dest].cbm+=cbm;byDest[dest].productCost+=r._pc;byDest[dest].containerCost+=r._cc;byDest[dest].drayage+=r._dr;byDest[dest].landedCost+=r._lc;byDest[dest].rows.push(r);

      const skus=Array.isArray(r["SKUs"])?r["SKUs"]:[];
      skus.forEach(sk=>{
        const sku=(sk?.sku||"Unnamed").trim()||"Unnamed";
        const qty=num(sk?.qty);
        const cpu=Number(itemSetup[sku]?.cost||0);
        if(!bySku[sku])bySku[sku]={qty:0,unit:sk?.unit||"units",shipments:new Set(),customers:new Set(),productCost:0,costPerUnit:cpu};
        bySku[sku].qty+=qty;bySku[sku].shipments.add(r["LQC PO#"]);bySku[sku].customers.add(r["Customer"]||"Unknown");bySku[sku].productCost+=qty*cpu;
      });
    });

    const logisticsCost=totalContainer+totalDrayage;
    const skuRows=Object.entries(bySku).map(([sku,v])=>({sku,qty:v.qty,unit:v.unit,shipments:v.shipments.size,customers:v.customers.size,productCost:v.productCost,costPerUnit:v.costPerUnit,pctOfProduct:totalProduct>0?v.productCost/totalProduct*100:0})).sort((a,b)=>b.productCost-a.productCost);
    const customerRows=Object.entries(byCustomer).map(([k,v])=>({customer:k,...v,pct:totalLanded>0?v.landedCost/totalLanded*100:0})).sort((a,b)=>b.landedCost-a.landedCost);
    const agentRows=Object.entries(byAgent).map(([k,v])=>({agent:k,shipments:v.shipments,onTimeRate:v.dated>0?Math.round(v.onTimeCt/v.dated*100):null,avgTransit:v.dated>0?Math.round(v.transitTotal/v.dated):null,rows:v.rows})).sort((a,b)=>b.shipments-a.shipments);
    const destRows=Object.entries(byDest).map(([k,v])=>({dest:k,shipments:v.shipments,containers:v.containers,cbm:Math.round(v.cbm),productCost:v.productCost,containerCost:v.containerCost,drayage:v.drayage,landedCost:v.landedCost,rows:v.rows,pct:totalLanded>0?v.landedCost/totalLanded*100:0})).sort((a,b)=>b.landedCost-a.landedCost);
    const customerRowsFull=Object.entries(byCustomer).map(([k,v])=>({customer:k,shipments:v.shipments,containers:v.containers,cbm:Math.round(v.cbm),productCost:v.productCost,containerCost:v.containerCost,drayage:v.drayage,landedCost:v.landedCost,rows:v.rows,pct:totalLanded>0?v.landedCost/totalLanded*100:0})).sort((a,b)=>b.landedCost-a.landedCost);

    return{
      rows,byMonthCost,byStatus,skuRows,customerRows:customerRowsFull,agentRows,destRows,
      openRows,overdueRows,onTimeRows,datedRows,
      totals:{shipments:rows.length,totalLanded,totalProduct,totalContainer,totalDrayage,logisticsCost,openValue,overdueCount:overdueRows.length,onTimeRate:datedRows.length?Math.round(onTimeRows.length/datedRows.length*100):null,avgCost:rows.length?totalLanded/rows.length:0,logisticsPct:totalLanded>0?Math.round(logisticsCost/totalLanded*100):0,productPct:totalLanded>0?Math.round(totalProduct/totalLanded*100):0}
    };
  },[f,dateField,itemSetup]);

  const months=Object.keys(metrics.byMonthCost).sort();
  const t=metrics.totals;
  const sel={fontSize:12,padding:"7px 10px",border:`1px solid ${V.border}`,borderRadius:8,background:V.bg,color:V.text};
  const activeFilters=[fC!=="All",fA!=="All",fS!=="In-Process",df!=="",dt!==""].filter(Boolean).length;
  function clearFilters(){setFC("All");setFA("All");setFS("In-Process");setDF("");setDT("");}
  const $f=v=>v>=1000000?`$${(v/1000000).toFixed(2)}M`:v>=1000?`$${(v/1000).toFixed(1)}k`:`$${Math.round(v).toLocaleString()}`;
  function openDrill(title,rows){setDrill({title,rows:[...rows].sort((a,b)=>b._lc-a._lc)});}

  const kpiCards=[
    {key:"landed",label:"Total Landed Cost",value:$f(t.totalLanded),sub:`${t.shipments} shipments`,color:"#1d4ed8",note:"Product + Container + Drayage",rows:metrics.rows},
    {key:"open",label:"Open PO Value",value:$f(t.openValue),sub:`${metrics.openRows.length} active orders`,color:"#059669",note:"Non-delivered landed cost exposure",rows:metrics.openRows},
    {key:"product",label:"Product Cost",value:$f(t.totalProduct),sub:`${t.productPct}% of landed`,color:"#7c3aed",note:"Unit cost × qty from Item Setup",rows:metrics.rows.filter(r=>r._pc>0)},
    {key:"logistics",label:"Logistics Cost",value:$f(t.logisticsCost),sub:`${t.logisticsPct}% of landed`,color:"#f97316",note:`Container + Drayage`,rows:metrics.rows.filter(r=>r._cc>0||r._dr>0)},
    {key:"avg",label:"Avg Cost / Shipment",value:$f(t.avgCost),sub:`across ${t.shipments} POs`,color:"#0e7490",note:"Total landed ÷ shipment count",rows:[...metrics.rows].sort((a,b)=>b._lc-a._lc)},
    {key:"ontime",label:"On-Time Rate",value:t.onTimeRate!==null?`${t.onTimeRate}%`:"—",sub:`${metrics.onTimeRows.length} of ${metrics.datedRows.length} dated`,color:t.onTimeRate===null?"#94a3b8":t.onTimeRate>=80?"#059669":t.onTimeRate>=60?"#f97316":"#dc2626",note:"ETA vs lane benchmark",rows:metrics.datedRows},
    {key:"overdue",label:"Overdue In Transit",value:String(t.overdueCount),sub:t.overdueCount>0?"Past ETA, still in transit":"All on track",color:t.overdueCount>0?"#dc2626":"#059669",note:"In Transit shipments past ETA",rows:metrics.overdueRows},
  ];

  return(
    <div style={{padding:24}}>

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Intelligence</div>
          <div style={{fontSize:26,fontWeight:800,color:V.text,letterSpacing:"-0.03em",lineHeight:1,marginBottom:8}}>Analytics</div>
          <div style={{fontSize:12,color:V.text2,display:"flex",alignItems:"center",gap:8}}>
            {f.length} of {data.length} shipments
            {activeFilters>0&&<span style={{background:"#fef9c3",color:"#854d0e",fontSize:10,padding:"2px 10px",borderRadius:10,fontWeight:700,border:"1px solid #fde68a"}}>{activeFilters} filter{activeFilters>1?"s":""}</span>}
          </div>
        </div>
        {activeFilters>0&&<button onClick={clearFilters} style={{fontSize:12,padding:"7px 16px",border:`1px solid ${V.border2}`,borderRadius:9,background:V.bg,cursor:"pointer",color:V.text2,fontWeight:500}}>✕ Clear filters</button>}
      </div>

      {/* FILTERS */}
      <div style={{background:V.bg,border:`1px solid ${V.border}`,borderRadius:14,padding:"14px 18px",marginBottom:16,boxShadow:"0 1px 4px rgba(15,23,42,0.06)"}}>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-end"}}>
          {[["Customer",<select value={fC} onChange={e=>setFC(e.target.value)} style={sel}>{customers.map(c=><option key={c}>{c}</option>)}</select>],
            ["Agent",<select value={fA} onChange={e=>setFA(e.target.value)} style={sel}>{agents.map(a=><option key={a}>{a}</option>)}</select>],
            ["Status",<select value={fS} onChange={e=>setFS(e.target.value)} style={sel}><option value="In-Process">In-Process (excl. Delivered)</option><option value="All">All (incl. Delivered)</option>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select>],
            ["Date By",<select value={dateField} onChange={e=>setDateField(e.target.value)} style={sel}>{["ETD","ETA"].map(d=><option key={d}>{d}</option>)}</select>],
          ].map(([label,control])=>(
            <div key={label} style={{display:"flex",flexDirection:"column",gap:3}}>
              <span style={{fontSize:10,fontWeight:600,color:V.text2,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</span>
              {control}
            </div>
          ))}
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            <span style={{fontSize:10,fontWeight:600,color:V.text2,textTransform:"uppercase",letterSpacing:".05em"}}>Date Range</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="date" value={df} onChange={e=>setDF(e.target.value)} style={sel}/>
              <span style={{fontSize:11,color:V.text2}}>→</span>
              <input type="date" value={dt} onChange={e=>setDT(e.target.value)} style={sel}/>
            </div>
          </div>
        </div>
      </div>

      {/* KPI CARDS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8,marginBottom:14}}>
        {kpiCards.map(k=>{
          const active=drill?.title===k.label;
          return(
            <div key={k.key} onClick={()=>active?setDrill(null):openDrill(k.label,k.rows)} className="kpi-card"
              style={{
                background:active?`linear-gradient(145deg,#fff,${k.color}10)`:`linear-gradient(145deg,#fff,${k.color}05)`,
                border:`1px solid ${active?k.color+"50":V.border}`,
                borderRadius:14,padding:"16px 14px",cursor:"pointer",position:"relative",overflow:"hidden",
                boxShadow:active?`0 0 0 3px ${k.color}14,0 6px 24px ${k.color}14`:"0 1px 3px rgba(15,23,42,0.07)"}}>
              <div style={{position:"absolute",top:12,right:12,width:6,height:6,borderRadius:"50%",background:k.color,opacity:active?1:0.28}}/>
              <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".09em",marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:14}}>{k.label}</div>
              <div style={{fontSize:22,fontWeight:800,color:k.color,lineHeight:1,marginBottom:5,letterSpacing:"-0.02em"}}>{k.value}</div>
              <div style={{fontSize:10,color:V.text2,lineHeight:1.4}}>{k.sub}</div>
              <div style={{fontSize:9,color:active?k.color:V.text2,marginTop:6,fontWeight:active?600:400}}>{active?"▲ close":"↓ drill"}</div>
            </div>
          );
        })}
      </div>

      {/* DRILL PANEL */}
      {drill&&(
        <div style={{background:V.bg,border:`1px solid ${V.border}`,borderRadius:12,marginBottom:14,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:V.bg2,borderBottom:`0.5px solid ${V.border}`}}>
            <div style={{fontSize:13,fontWeight:700,color:V.text}}>{drill.title} <span style={{fontSize:11,fontWeight:400,color:V.text2}}>— {drill.rows.length} shipment{drill.rows.length!==1?"s":""}</span></div>
            <button onClick={()=>setDrill(null)} style={{fontSize:12,padding:"4px 12px",border:`0.5px solid ${V.border2}`,borderRadius:6,background:"transparent",cursor:"pointer",color:V.text2}}>✕ Close</button>
          </div>
          <div style={{overflowX:"auto",maxHeight:300,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:760,fontSize:12}}>
              <thead style={{position:"sticky",top:0}}>
                <tr style={{background:V.bg3,fontSize:10,color:V.text2,textTransform:"uppercase",letterSpacing:".04em"}}>
                  {["PO #","Customer","Status","ETA","Product Cost","Container","Drayage","Landed Cost"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",borderBottom:`0.5px solid ${V.border}`,fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {drill.rows.length===0&&<tr><td colSpan={8} style={{padding:24,textAlign:"center",color:V.text2}}>No shipments match.</td></tr>}
                {drill.rows.map((r,i)=>(
                  <tr key={r["LQC PO#"]||i} style={{background:i%2===0?V.bg:"rgba(0,0,0,.012)",borderBottom:`0.5px solid ${V.border}`}}>
                    <td style={{padding:"8px 12px",fontWeight:600,color:"#b45309"}}>{r["LQC PO#"]||"—"}</td>
                    <td style={{padding:"8px 12px",color:V.text}}>{r["Customer"]||"—"}</td>
                    <td style={{padding:"8px 12px"}}><span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:`${STATUS_COLORS[r["Status"]]||"#64748b"}22`,color:STATUS_COLORS[r["Status"]]||"#64748b"}}>{r["Status"]||"—"}</span></td>
                    <td style={{padding:"8px 12px",color:V.text2}}>{fmtDate(r["ETA"])}</td>
                    <td style={{padding:"8px 12px",color:"#059669",fontWeight:r._pc>0?600:400}}>{r._pc>0?$f(r._pc):"—"}</td>
                    <td style={{padding:"8px 12px",color:"#f97316",fontWeight:r._cc>0?600:400}}>{r._cc>0?$f(r._cc):"—"}</td>
                    <td style={{padding:"8px 12px",color:"#7c3aed",fontWeight:r._dr>0?600:400}}>{r._dr>0?$f(r._dr):"—"}</td>
                    <td style={{padding:"8px 12px",color:"#1d4ed8",fontWeight:700}}>{r._lc>0?$f(r._lc):"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {drill.rows.length>0&&(()=>{
            const tPC=drill.rows.reduce((s,r)=>s+r._pc,0),tCC=drill.rows.reduce((s,r)=>s+r._cc,0),tDR=drill.rows.reduce((s,r)=>s+r._dr,0),tLC=drill.rows.reduce((s,r)=>s+r._lc,0);
            return<div style={{display:"flex",gap:20,padding:"10px 16px",background:V.bg3,borderTop:`0.5px solid ${V.border}`,fontSize:12,flexWrap:"wrap"}}>
              <span style={{color:V.text2,fontWeight:600}}>Totals:</span>
              {tPC>0&&<span style={{color:"#059669",fontWeight:700}}>Product {$f(tPC)}</span>}
              {tCC>0&&<span style={{color:"#f97316",fontWeight:700}}>Container {$f(tCC)}</span>}
              {tDR>0&&<span style={{color:"#7c3aed",fontWeight:700}}>Drayage {$f(tDR)}</span>}
              <span style={{color:"#1d4ed8",fontWeight:700}}>Landed {$f(tLC)}</span>
            </div>;
          })()}
        </div>
      )}

      {/* MONTHLY TREND */}
      <div style={{background:V.bg,border:`0.5px solid ${V.border}`,borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:V.text}}>Monthly Landed Cost Trend</div>
            <div style={{fontSize:11,color:V.text2,marginTop:2}}>Real cost by {dateField} · click bar to drill</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {[{key:"productCost",label:"Product",color:"#059669"},{key:"containerCost",label:"Container",color:"#f97316"},{key:"drayage",label:"Drayage",color:"#7c3aed"}].map(({key,label,color})=>(
              <button key={key} onClick={()=>setChartFilters(p=>({...p,[key]:!p[key]}))}
                style={{fontSize:11,padding:"4px 11px",borderRadius:20,border:`1.5px solid ${color}`,background:chartFilters[key]?color:"transparent",color:chartFilters[key]?"#fff":color,cursor:"pointer",fontWeight:500}}>
                {label}
              </button>
            ))}
          </div>
        </div>
        {(()=>{
          const activeKeys=["productCost","containerCost","drayage"].filter(k=>chartFilters[k]);
          const COLORS={productCost:"#059669",containerCost:"#f97316",drayage:"#7c3aed"};
          const maxStack=Math.max(...months.map(m=>{const mc=metrics.byMonthCost[m]||{};return activeKeys.reduce((s,k)=>s+(mc[k]||0),0);}),1);
          const hasData=months.some(m=>{const mc=metrics.byMonthCost[m]||{};return activeKeys.some(k=>(mc[k]||0)>0);});
          if(months.length===0)return<div style={{fontSize:12,color:V.text2,padding:"32px 0",textAlign:"center"}}>No data in selected range.</div>;
          if(activeKeys.length===0)return<div style={{fontSize:12,color:V.text2,padding:"32px 0",textAlign:"center"}}>Select a cost component to display.</div>;
          if(!hasData)return<div style={{fontSize:12,color:V.text2,padding:"32px 0",textAlign:"center"}}>No cost data yet — enter Container Cost, Drayage, and Item Setup unit costs on your shipments.</div>;
          return(<>
            <div style={{display:"flex",alignItems:"flex-end",gap:5,height:180,overflowX:"auto",paddingBottom:4}}>
              {months.map(m=>{
                const mc=metrics.byMonthCost[m]||{};
                const tot=activeKeys.reduce((s,k)=>s+(mc[k]||0),0);
                const barH=tot>0?Math.max(4,Math.round(tot/maxStack*148)):0;
                const lbl=new Date(m+"-02").toLocaleDateString("en-US",{month:"short",year:"2-digit"});
                const mRows=metrics.rows.filter(r=>{const d=parseDate(r[dateField]);if(!d)return false;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`===m;});
                return(
                  <div key={m} onClick={()=>openDrill(`${lbl} Shipments`,mRows)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:52,flexShrink:0,cursor:"pointer"}}>
                    <span style={{fontSize:10,fontWeight:600,color:V.text2,height:16,lineHeight:"16px"}}>{tot>=1000?`$${(tot/1000).toFixed(1)}k`:tot>0?`$${Math.round(tot)}`:""}</span>
                    <div style={{width:36,height:148,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
                      <div style={{display:"flex",flexDirection:"column",width:"100%",height:`${barH}px`,borderRadius:"4px 4px 2px 2px",overflow:"hidden",flexShrink:0}}>
                        {activeKeys.map(k=>{const v=mc[k]||0;const segH=tot>0?Math.round(v/tot*barH):0;return segH>0?<div key={k} style={{width:"100%",height:`${segH}px`,background:COLORS[k],flexShrink:0}}/>:null;})}
                      </div>
                    </div>
                    <span style={{fontSize:10,color:V.text2,whiteSpace:"nowrap"}}>{lbl}</span>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:20,marginTop:10,paddingTop:10,borderTop:`0.5px solid ${V.border}`,flexWrap:"wrap"}}>
              {activeKeys.map(k=>{const tot=months.reduce((s,m)=>s+(metrics.byMonthCost[m]?.[k]||0),0);return(<div key={k} style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}><div style={{width:10,height:10,borderRadius:2,background:COLORS[k]}}/><span style={{color:V.text2}}>{k==="productCost"?"Product":k==="containerCost"?"Container":"Drayage"}:</span><strong style={{color:V.text}}>{$f(tot)}</strong></div>);})}
              <div style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"#1d4ed8"}}>Total: {$f(months.reduce((s,m)=>{const mc=metrics.byMonthCost[m]||{};return s+activeKeys.reduce((ss,k)=>ss+(mc[k]||0),0);},0))}</div>
            </div>
          </>);
        })()}
      </div>

      {/* INBOUND BY WAREHOUSE + INBOUND BY CUSTOMER */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>

        {/* INBOUND BY WAREHOUSE */}
        <div style={{background:V.bg,border:`0.5px solid ${V.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",background:V.bg2,borderBottom:`0.5px solid ${V.border}`}}>
            <div style={{fontSize:13,fontWeight:700,color:V.text}}>Inbound by Warehouse / Destination</div>
            <div style={{fontSize:11,color:V.text2,marginTop:2}}>Click a row to drill into shipments to that location</div>
          </div>
          <div style={{overflowX:"auto",maxHeight:380,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead style={{position:"sticky",top:0}}>
                <tr style={{background:V.bg3,fontSize:10,color:V.text2,textTransform:"uppercase",letterSpacing:".04em"}}>
                  {["Location","POs","Ctrs","CBM","Product","Logistics","Landed"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",borderBottom:`0.5px solid ${V.border}`,fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {metrics.destRows.map((r,i)=>(
                  <tr key={r.dest} onClick={()=>openDrill(`${r.dest} — Shipments`,r.rows)} style={{background:i%2===0?V.bg:"rgba(0,0,0,.012)",borderBottom:`0.5px solid ${V.border}`,cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#fef3c733"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?V.bg:"rgba(0,0,0,.012)"}>
                    <td style={{padding:"8px 10px",fontWeight:600,color:V.text,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {INTERNAL_LOCS.has(r.dest)&&<span style={{fontSize:9,fontWeight:700,padding:"1px 4px",borderRadius:3,background:"#1e293b",color:"#94a3b8",marginRight:4}}>WH</span>}
                      {r.dest}
                    </td>
                    <td style={{padding:"8px 10px",color:V.text2,textAlign:"center"}}>{r.shipments}</td>
                    <td style={{padding:"8px 10px",color:V.text2,textAlign:"center"}}>{r.containers||"—"}</td>
                    <td style={{padding:"8px 10px",color:V.text2}}>{r.cbm>0?`${r.cbm.toLocaleString()}`:"—"}</td>
                    <td style={{padding:"8px 10px",color:"#059669",fontWeight:r.productCost>0?600:400}}>{r.productCost>0?$f(r.productCost):"—"}</td>
                    <td style={{padding:"8px 10px",color:"#f97316",fontWeight:(r.containerCost+r.drayage)>0?600:400}}>{(r.containerCost+r.drayage)>0?$f(r.containerCost+r.drayage):"—"}</td>
                    <td style={{padding:"8px 10px",fontWeight:700,color:"#1d4ed8"}}>{r.landedCost>0?$f(r.landedCost):"—"}</td>
                  </tr>
                ))}
                {metrics.destRows.length===0&&<tr><td colSpan={7} style={{padding:20,textAlign:"center",color:V.text2}}>No destination data.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>

        {/* INBOUND BY CUSTOMER */}
        <div style={{background:V.bg,border:`0.5px solid ${V.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"12px 16px",background:V.bg2,borderBottom:`0.5px solid ${V.border}`}}>
            <div style={{fontSize:13,fontWeight:700,color:V.text}}>Inbound by Customer</div>
            <div style={{fontSize:11,color:V.text2,marginTop:2}}>Click a row to drill into that customer's shipments</div>
          </div>
          <div style={{overflowX:"auto",maxHeight:380,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead style={{position:"sticky",top:0}}>
                <tr style={{background:V.bg3,fontSize:10,color:V.text2,textTransform:"uppercase",letterSpacing:".04em"}}>
                  {["Customer","POs","Ctrs","CBM","Product","Logistics","Landed","Share"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",borderBottom:`0.5px solid ${V.border}`,fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {metrics.customerRows.map((r,i)=>(
                  <tr key={r.customer} onClick={()=>openDrill(`${r.customer} — Shipments`,r.rows)} style={{background:i%2===0?V.bg:"rgba(0,0,0,.012)",borderBottom:`0.5px solid ${V.border}`,cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#fef3c733"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?V.bg:"rgba(0,0,0,.012)"}>
                    <td style={{padding:"8px 10px",fontWeight:600,color:V.text,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.customer}</td>
                    <td style={{padding:"8px 10px",color:V.text2,textAlign:"center"}}>{r.shipments}</td>
                    <td style={{padding:"8px 10px",color:V.text2,textAlign:"center"}}>{r.containers||"—"}</td>

// ─── ITEM SETUP ───────────────────────────────────────────
function ItemSetup({skuCatalog,itemSetup,saveItemSetup,syncing}){
  const [draft,setDraft]=useState(()=>({...itemSetup}));
  const [saved,setSaved]=useState(false);
  const [newSku,setNewSku]=useState("");
  const allSkus=useMemo(()=>{const set=new Set([...skuCatalog,...Object.keys(draft)]);return [...set].sort((a,b)=>a.localeCompare(b));},[skuCatalog,draft]);
  function setField(sku,field,val){setDraft(d=>{const prev=d[sku]||{cost:"",customsPct:""};return{...d,[sku]:{...prev,[field]:val}};});setSaved(false);}
  async function handleSave(){const clean={};Object.entries(draft).forEach(([sku,vals])=>{if(vals.cost!==""||vals.customsPct!=="")clean[sku]=vals;});await saveItemSetup(clean);setDraft(clean);setSaved(true);setTimeout(()=>setSaved(false),2500);}
  function addManualSku(){const name=newSku.trim();if(!name)return;setDraft(d=>({...d,[name]:d[name]||{cost:"",customsPct:""}}));setNewSku("");setSaved(false);}
  function removeSku(sku){setDraft(d=>{const n={...d};delete n[sku];return n;});setSaved(false);}
  const fld={fontSize:13,padding:"5px 8px",border:`0.5px solid ${V.border2}`,borderRadius:6,background:V.bg,color:V.text,width:"100%",boxSizing:"border-box"};
  return(
    <div style={{padding:24,maxWidth:860}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div>
          <div style={{fontSize:9,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>Configuration</div>
          <div style={{fontSize:26,fontWeight:800,color:V.text,letterSpacing:"-0.03em",lineHeight:1,marginBottom:10}}>Item Setup</div>
          <p style={{fontSize:13,color:V.text2,margin:0,maxWidth:480}}>Set unit costs and customs duty percentages for each product. Values sync to Google Sheets and apply across all devices.</p>
        </div>
        <button onClick={handleSave} disabled={syncing} style={{fontSize:13,padding:"9px 22px",border:"none",borderRadius:10,background:syncing?"#92400e":saved?"#059669":"#b45309",color:"#fff",cursor:syncing?"default":"pointer",fontWeight:600,flexShrink:0,marginLeft:16,boxShadow:syncing?"none":"0 3px 12px rgba(180,83,9,0.3)"}}>{syncing?"Syncing…":saved?"✓ Saved":"Save changes"}</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:18,marginTop:16}}>
        <input value={newSku} onChange={e=>setNewSku(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addManualSku()} placeholder="Add a product not yet in a shipment…" style={{...fld,flex:1,padding:"7px 10px"}}/>
        <button onClick={addManualSku} style={{fontSize:13,padding:"7px 16px",border:`0.5px solid ${V.border2}`,borderRadius:8,background:"transparent",cursor:"pointer",color:V.text,flexShrink:0}}>+ Add</button>
      </div>
      {allSkus.length===0&&(<div style={{background:V.bg,border:`0.5px solid ${V.border}`,borderRadius:12,padding:32,textAlign:"center",color:V.text2,fontSize:13}}>No products found. Products appear here automatically once shipments with SKUs are loaded, or you can add them manually above.</div>)}
      {allSkus.length>0&&(
        <div style={{background:V.bg,border:`0.5px solid ${V.border}`,borderRadius:12,overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 160px 160px 36px",gap:12,padding:"10px 16px",background:V.bg3,borderBottom:`0.5px solid ${V.border}`,fontSize:11,fontWeight:600,color:V.text2,textTransform:"uppercase",letterSpacing:".05em"}}>
            <div>Product / SKU</div><div>Unit Cost (USD)</div><div>Customs % (Duty)</div><div/>
          </div>
          {allSkus.map((sku,i)=>{
            const vals=draft[sku]||{cost:"",customsPct:""};
            const isFromShipment=skuCatalog.includes(sku);
            return(
              <div key={sku} style={{display:"grid",gridTemplateColumns:"1fr 160px 160px 36px",gap:12,padding:"10px 16px",borderBottom:i<allSkus.length-1?`0.5px solid ${V.border}`:"none",alignItems:"center",background:i%2===0?V.bg:V.bg2}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:13,fontWeight:500,color:V.text}}>{sku}</span>
                  {isFromShipment&&<span style={{fontSize:9,background:"rgba(180,87,9,.12)",color:"#b45309",borderRadius:4,padding:"1px 5px",fontWeight:600}}>IN USE</span>}
                </div>
                <div style={{position:"relative"}}>
                  <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:V.text2,pointerEvents:"none"}}>$</span>
                  <input type="number" min="0" step="0.01" value={vals.cost} onChange={e=>setField(sku,"cost",e.target.value)} placeholder="0.00" style={{...fld,paddingLeft:20}}/>
                </div>
                <div style={{position:"relative"}}>
                  <input type="number" min="0" max="100" step="0.1" value={vals.customsPct} onChange={e=>setField(sku,"customsPct",e.target.value)} placeholder="0.0" style={{...fld,paddingRight:20}}/>
                  <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:12,color:V.text2,pointerEvents:"none"}}>%</span>
                </div>
                <button onClick={()=>removeSku(sku)} title="Remove" style={{fontSize:15,border:"none",background:"transparent",cursor:"pointer",color:"#94a3b8",padding:0,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>
            );
          })}
        </div>
      )}
      {allSkus.length>0&&(<div style={{marginTop:14,fontSize:12,color:V.text2}}>{allSkus.length} product{allSkus.length!==1?"s":""} · Changes are saved locally in your browser.</div>)}
    </div>
  );
}

  );
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h2 style={{fontSize:18,fontWeight:500,margin:0}}>Order management</h2>
        <button onClick={()=>{setNewRow(blank());setMode("new");}} style={{fontSize:13,padding:"7px 16px",border:"none",borderRadius:8,background:"#b45309",color:"#fff",cursor:"pointer",fontWeight:500}}>+ New shipment</button>
      </div>
      <div style={{background:V.bg,border:`0.5px solid ${V.border}`,borderRadius:12,padding:14,marginBottom:14,fontSize:13,color:V.text2}}>
        New shipments are saved directly to your Google Sheet. Use the <strong>Shipments</strong> tab to edit or update statuses on existing orders.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {["RJW PA P01","Unitrans MA","RJW TX D01"].map(w=>(
          <div key={w} style={{background:V.bg,border:`0.5px solid ${V.border}`,borderRadius:12,padding:16}}>
            <div style={{fontSize:12,fontWeight:500,marginBottom:4}}>🏬 {w}</div>
            <div style={{fontSize:12,color:V.text2}}>{data.filter(r=>r["Destination"]&&r["Destination"].toLowerCase().includes(w.toLowerCase().split(" ")[0])).length} shipments</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function SkuAutocompleteInput({value,onChange,options,placeholder,style}){
  const listId=useId();
  return(
    <>
      <input list={listId} placeholder={placeholder} value={value} onChange={onChange} style={style}/>
      <datalist id={listId}>
        {options.map(sku=><option key={sku} value={sku}/>)}
      </datalist>
    </>
  );
}

const CONTAINER_CBM={"20ft":25,"40ft":55,"40ft HC":60,"45ft HC":72};
function ShipmentForm({row,setRow,onSave,onCancel,syncing,skuCatalog,locations}){

    setRow(r=>{
      const updated={...r,[k]:v};

        <div><label style={lbl}>Shipping model</label><select value={row["Shipping Model"]} onChange={e=>set("Shipping Model",e.target.value)} style={fld}>{["Direct to Client","US Warehouse","Port Pickup"].map(m=><option key={m}>{m}</option>)}</select></div>

      </div>
      <div style={{background:V.bg3,border:`0.5px solid ${V.border}`,borderRadius:8,padding:"12px 14px",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:600,color:V.text2,textTransform:"uppercase",letterSpacing:".05em",marginBottom:10}}>Container & Volume</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>

          <div><label style={lbl}>Container Size</label>

      <div style={{display:"flex",gap:8}}>
        <button onClick={onSave} disabled={syncing} style={{fontSize:13,padding:"7px 20px",border:"none",borderRadius:8,background:"#b45309",color:"#fff",cursor:"pointer",fontWeight:500}}>{syncing?"Saving…":"Save shipment"}</button>
        <button onClick={onCancel} style={{fontSize:13,padding:"7px 16px",border:`0.5px solid ${V.border2}`,borderRadius:8,background:"transparent",cursor:"pointer",color:V.text}}>Cancel</button>
      </div>
    </div>
  );
}

// ─── EDIT MODAL (ERP Shipment File) ──────────────────────
function EditModal({row,onSave,onClose,syncing,skuCatalog,itemSetup,locations}){
  itemSetup=itemSetup||{};
  const locNames=locations&&locations.length>0?locations.map(l=>l.name):WAREHOUSE_LOCATIONS;
  const [r,setR]=useState({...row,SKUs:Array.isArray(row["SKUs"])?[...row["SKUs"].map(s=>({...s}))]:[{sku:"",qty:"",unit:"CTN"}]});
  const set=(k,v)=>setR(p=>({...p,[k]:v}));
  const setSku=(i,k,v)=>setR(p=>{const s=[...p.SKUs];s[i]={...s[i],[k]:v};return{...p,SKUs:s};});
  function setContainer(k,v){setR(p=>{const u={...p,[k]:v};const qty=k==="Container Qty"?Number(v):Number(p["Container Qty"]||0);const size=k==="Container Size"?v:(p["Container Size"]||"");const cbm=CONTAINER_CBM[size];if(qty>0&&cbm)u["Volume"]=String(qty*cbm);return u;});}
  function handleSave(){onSave({...r,SKUs:r.SKUs});}
  const num=v=>{const n=Number(String(v??"").replace(/[^0-9.-]/g,""));return Number.isFinite(n)?n:0;};
  const totalPC=r.SKUs.reduce((s,sk)=>s+num(sk.qty)*Number(itemSetup[sk.sku]?.cost||0),0);
  const etd=parseDate(r["ETD"]),eta=parseDate(r["ETA"]);
  const transitDays=etd&&eta?Math.round((eta-etd)/86400000):null;
  const dta=eta?daysDiff(eta):null;
  const statusIdx=STATUSES.indexOf(r["Status"]);
  const fld={width:"100%",fontSize:13,padding:"7px 10px",border:`1px solid ${V.border2}`,borderRadius:7,background:V.bg,color:V.text,boxSizing:"border-box"};
  const lbl={fontSize:10,fontWeight:700,color:V.text2,marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:".05em"};
  const sec={background:V.bg,border:`1px solid ${V.border}`,borderRadius:10,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,.05)"};
  return(
    <div className="modal-overlay" style={{alignItems:"flex-start",paddingTop:20}}>
      <div style={{background:V.bg3,borderRadius:16,border:`1px solid ${V.border}`,width:1000,maxWidth:"96vw",maxHeight:"92vh",overflow:"auto",boxShadow:"0 12px 48px rgba(0,0,0,.2)"}}>
        {/* DARK HEADER */}
        <div style={{background:"linear-gradient(135deg,#1e293b 0%,#334155 100%)",borderRadius:"16px 16px 0 0",padding:"20px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:".12em",marginBottom:4}}>Shipment File</div>
              <div style={{fontSize:26,fontWeight:800,color:"#f8fafc",letterSpacing:"-0.02em",marginBottom:4}}>{r["LQC PO#"]}</div>
              <div style={{fontSize:14,color:"#94a3b8"}}>{r["Customer"]}{r["Customer PO"]&&<span style={{color:"#64748b",marginLeft:8}}>· {r["Customer PO"]}</span>}</div>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"flex-start",flexShrink:0}}>
              {dta!==null&&<div style={{fontSize:11,fontWeight:700,padding:"6px 12px",borderRadius:8,background:"rgba(255,255,255,.08)",color:dta<0?"#f87171":dta<=3?"#fbbf24":"#86efac",whiteSpace:"nowrap"}}>{dta<0?`${Math.abs(dta)}d overdue`:dta===0?"Today":dta===1?"Tomorrow":`${dta}d to ETA`}</div>}
              <button onClick={onClose} style={{fontSize:18,border:"1px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.08)",cursor:"pointer",color:"#94a3b8",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          </div>
          {/* STATUS TIMELINE */}
          <div style={{display:"flex",alignItems:"center",gap:0,overflowX:"auto",paddingBottom:2}}>
            {STATUSES.map((s,i)=>{
              const past=i<statusIdx,curr=i===statusIdx;
              return(<React.Fragment key={s}>
                <div onClick={()=>set("Status",s)} style={{fontSize:10,padding:"4px 10px",borderRadius:4,cursor:"pointer",whiteSpace:"nowrap",
                  background:curr?"rgba(255,255,255,.22)":past?"rgba(255,255,255,.08)":"transparent",
                  color:curr?"#fff":past?"#94a3b8":"#475569",fontWeight:curr?700:400,
                  border:`1px solid ${curr?"rgba(255,255,255,.35)":past?"rgba(255,255,255,.12)":"rgba(255,255,255,.07)"}`,transition:"all 0.1s"}}>
                  {curr?"◉ ":past?"✓ ":"○ "}{s}
                </div>
                {i<STATUSES.length-1&&<div style={{width:14,height:1,background:"rgba(255,255,255,.12)",flexShrink:0}}/>}
              </React.Fragment>);
            })}
          </div>
        </div>
        {/* BODY */}
        <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:14}}>
          {/* 3-COLUMN GRID */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
            {/* SHIPMENT DETAILS */}
            <div style={sec}>
              <div style={{fontSize:10,fontWeight:700,color:"#b45309",textTransform:"uppercase",letterSpacing:".07em",marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${V.border}`}}>Shipment Details</div>
              {[["Customer","Customer"],["Customer PO","Customer PO"],["ETD","ETD","date"],["ETA","ETA","date"],["MABD","MABD","date"],["Agent","Agent"]].map(([l,k,t])=>(
                <div key={k} style={{marginBottom:9}}><label style={lbl}>{l}</label><input type={t||"text"} value={r[k]||""} onChange={e=>set(k,e.target.value)} style={fld}/></div>
              ))}
              {transitDays!==null&&<div style={{fontSize:11,color:V.text2,marginTop:4,padding:"6px 10px",background:V.bg3,borderRadius:6}}>Transit: <strong style={{color:V.text}}>{transitDays} days</strong></div>}
            </div>
            {/* CONTAINER */}
            <div style={sec}>
              <div style={{fontSize:10,fontWeight:700,color:"#7c3aed",textTransform:"uppercase",letterSpacing:".07em",marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${V.border}`}}>Container & Freight</div>
              <div style={{marginBottom:9}}><label style={lbl}># of Containers</label><input type="number" min="1" value={r["Container Qty"]||""} onChange={e=>setContainer("Container Qty",e.target.value)} style={fld}/></div>
              <div style={{marginBottom:9}}><label style={lbl}>Container Size</label>
                <select value={r["Container Size"]||""} onChange={e=>setContainer("Container Size",e.target.value)} style={fld}>
                  <option value="">Select size…</option>
                  {["20ft","40ft","40ft HC","45ft HC"].map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div style={{marginBottom:9}}><label style={lbl}>Volume (CBM)</label><input type="number" value={r["Volume"]||""} onChange={e=>set("Volume",e.target.value)} placeholder="Auto-calculated" style={fld}/></div>
              {[["Container #","Container #"],["BOL #","BOL #"],["O/F","O/F"],["Invoice #","Invoice #"]].map(([l,k])=>(
                <div key={k} style={{marginBottom:9}}><label style={lbl}>{l}</label><input value={r[k]||""} onChange={e=>set(k,e.target.value)} style={fld}/></div>
              ))}
            </div>
            {/* ROUTING & COST */}
            <div style={sec}>
              <div style={{fontSize:10,fontWeight:700,color:"#0e7490",textTransform:"uppercase",letterSpacing:".07em",marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${V.border}`}}>Routing & Cost</div>
              <div style={{marginBottom:9}}><label style={lbl}>Shipping Model</label>
                <select value={r["Shipping Model"]||""} onChange={e=>set("Shipping Model",e.target.value)} style={fld}>{["Direct to Client","US Warehouse","Port Pickup"].map(m=><option key={m}>{m}</option>)}</select>
              </div>
              <div style={{marginBottom:9}}><label style={lbl}>POD (Port of Discharge)</label><input value={r["POD"]||""} onChange={e=>set("POD",e.target.value)} style={fld}/></div>
              <div style={{marginBottom:9}}>
                <label style={lbl}>Landing Location <span style={{fontSize:9,background:"rgba(14,116,144,.15)",color:"#0e7490",borderRadius:3,padding:"1px 4px",fontWeight:700,marginLeft:3}}>WH</span></label>
                <select value={r["Landing Location"]||""} onChange={e=>set("Landing Location",e.target.value)} style={fld}>
                  <option value="">Select location…</option>
                  {locNames.map(l=><option key={l}>{l}</option>)}
                </select>
              </div>
              <div style={{marginBottom:9}}><label style={lbl}>Final Destination</label><input value={r["Destination"]||""} onChange={e=>set("Destination",e.target.value)} style={fld}/></div>
              {[["Container Cost ($)","Container Cost"],["Drayage ($)","Drayage"]].map(([l,k])=>(
                <div key={k} style={{marginBottom:9}}><label style={lbl}>{l}</label><input type="number" value={r[k]||""} onChange={e=>set(k,e.target.value)} style={fld}/></div>
              ))}
            </div>
          </div>
          {/* PRODUCTS */}
          <div style={{...sec,padding:0}}>
            <div style={{padding:"12px 18px",borderBottom:`1px solid ${V.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#059669",textTransform:"uppercase",letterSpacing:".07em"}}>Products</div>
              {totalPC>0&&<div style={{fontSize:13,fontWeight:700,color:"#059669"}}>Product Cost Total: ${Math.round(totalPC).toLocaleString()}</div>}
            </div>
            <div style={{padding:"0 18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"3fr 90px 70px 100px 100px 32px",gap:8,padding:"8px 0",fontSize:10,fontWeight:700,color:V.text2,textTransform:"uppercase",letterSpacing:".05em",borderBottom:`1px solid ${V.border}`}}>
                <span>Product / SKU</span><span>Qty</span><span>Unit</span><span style={{textAlign:"right"}}>Cost/Unit</span><span style={{textAlign:"right"}}>Line Total</span><span/>
              </div>
              {r.SKUs.map((s,i)=>{
                const cp=Number(itemSetup[s.sku]?.cost||0);
                const lt=cp*num(s.qty);
                return(<div key={i} style={{display:"grid",gridTemplateColumns:"3fr 90px 70px 100px 100px 32px",gap:8,padding:"8px 0",borderBottom:`1px solid ${V.border}`,alignItems:"center"}}>
                  <SkuAutocompleteInput value={s.sku} onChange={e=>setSku(i,"sku",e.target.value)} options={skuCatalog} style={{...fld,fontSize:12}} placeholder="Product name"/>
                  <input value={s.qty} onChange={e=>setSku(i,"qty",e.target.value)} style={{...fld,textAlign:"right"}} placeholder="0"/>
                  <input value={s.unit} onChange={e=>setSku(i,"unit",e.target.value)} style={fld} placeholder="CTN"/>
                  <div style={{fontSize:12,textAlign:"right",color:cp>0?V.text:V.text2,padding:"0 4px"}}>{cp>0?`$${cp.toFixed(2)}`:"—"}</div>
                  <div style={{fontSize:12,fontWeight:700,textAlign:"right",color:lt>0?"#059669":V.text2,padding:"0 4px"}}>{lt>0?`$${Math.round(lt).toLocaleString()}`:"—"}</div>
                  <button onClick={()=>setR(p=>({...p,SKUs:p.SKUs.filter((_,j)=>j!==i)}))} style={{fontSize:15,border:"none",background:"transparent",cursor:"pointer",color:"#94a3b8",padding:0}}>×</button>
                </div>);
              })}
              <div style={{padding:"10px 0"}}><button onClick={()=>setR(p=>({...p,SKUs:[...p.SKUs,{sku:"",qty:"",unit:"CTN"}]}))} style={{fontSize:12,padding:"5px 12px",border:`1px solid ${V.border2}`,borderRadius:6,background:"transparent",cursor:"pointer",color:V.text2}}>+ Add Product</button></div>
            </div>
          </div>
          {/* NOTES */}
          <div style={sec}><label style={lbl}>Notes</label><textarea value={r["Note"]||""} onChange={e=>set("Note",e.target.value)} rows={3} style={{...fld,resize:"vertical",fontFamily:"inherit",lineHeight:1.6}}/></div>
          {/* FOOTER */}
          <div style={{display:"flex",gap:10,paddingTop:4}}>
            <button onClick={handleSave} disabled={syncing} style={{fontSize:13,padding:"9px 28px",border:"none",borderRadius:8,background:"#b45309",color:"#fff",cursor:"pointer",fontWeight:700,boxShadow:"0 2px 10px rgba(180,87,9,.3)"}}>{syncing?"Saving…":"Save Shipment"}</button>
            <button onClick={onClose} style={{fontSize:13,padding:"9px 18px",border:`1px solid ${V.border2}`,borderRadius:8,background:"transparent",cursor:"pointer",color:V.text,fontWeight:500}}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── LOCATION SETUP ───────────────────────────────────────
function LocationSetup({locations,saveLocations,data}){
  const allCustomers=useMemo(()=>[...new Set((data||[]).map(r=>r["Customer"]).filter(Boolean))].sort(),[data]);
  const shipmentCounts=useMemo(()=>{
    const m={};
    (data||[]).forEach(r=>{const d=r["Landing Location"]||r["Destination"]||"";if(d)m[d]=(m[d]||0)+1;});
    return m;
  },[data]);

  const BLANK={id:"",name:"",code:"",type:"Warehouse",address:"",city:"",state:"",contact:"",phone:"",email:"",notes:"",customers:[]};
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(null);
  const [isNew,setIsNew]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);

  const TYPE_COLORS={"Warehouse":"#1d4ed8","DC":"#7c3aed","Customer":"#047857","Port":"#b45309","Other":"#64748b"};
  const TYPE_OPTS=["Warehouse","DC","Customer","Port","Other"];

  function startNew(){
    const draft={...BLANK,id:"loc_"+Date.now()};
    setEditing(draft);setIsNew(true);setSelected(null);
  }
  function startEdit(loc){setEditing({...loc});setIsNew(false);setSelected(loc.id);}
  function cancelEdit(){setEditing(null);setIsNew(false);}
  function handleSave(){
    if(!editing.name.trim())return;
    const updated=isNew?[...locations,editing]:locations.map(l=>l.id===editing.id?editing:l);
    saveLocations(updated);
    setSelected(editing.id);setEditing(null);setIsNew(false);
  }
  function handleDelete(id){
    saveLocations(locations.filter(l=>l.id!==id));
    setSelected(null);setEditing(null);setConfirmDel(null);
  }
  function toggleCustomer(c){
    setEditing(e=>{
      const cs=e.customers||[];
      return {...e,customers:cs.includes(c)?cs.filter(x=>x!==c):[...cs,c]};
    });
  }
  function set(k,v){setEditing(e=>({...e,[k]:v}));}

  const card={background:V.bg2,border:`1px solid ${V.border}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",transition:"border-color .15s",marginBottom:8};
  const fld={background:V.bg3,border:`1px solid ${V.border2}`,borderRadius:7,padding:"7px 10px",color:V.text,fontSize:13,width:"100%",boxSizing:"border-box"};
  const lbl={display:"block",fontSize:11,fontWeight:600,color:V.text2,marginBottom:4,textTransform:"uppercase",letterSpacing:.5};
  const sec={marginBottom:16};

  const displayLoc=selected?locations.find(l=>l.id===selected):null;

  return(
    <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:20,height:"calc(100vh - 120px)",overflow:"hidden"}}>
      {/* LEFT PANEL */}
      <div style={{display:"flex",flexDirection:"column",gap:0,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:700,color:V.text}}>Locations <span style={{fontSize:12,color:V.text2,fontWeight:400}}>({locations.length})</span></div>
          <button onClick={startNew} style={{fontSize:12,padding:"6px 14px",border:"none",borderRadius:7,background:"#b45309",color:"#fff",cursor:"pointer",fontWeight:600}}>+ New</button>
        </div>
        <div style={{overflowY:"auto",flex:1,paddingRight:2}}>
          {locations.length===0&&<div style={{color:V.text2,fontSize:13,textAlign:"center",paddingTop:40}}>No locations yet.<br/>Click + New to add one.</div>}
          {locations.map(loc=>{
            const isActive=selected===loc.id&&!editing;
            const sc=shipmentCounts[loc.name]||0;
            const tc=TYPE_COLORS[loc.type]||"#64748b";
            return(
              <div key={loc.id} onClick={()=>{if(!editing){startEdit(loc);}}} style={{...card,borderColor:isActive?"#b45309":V.border,boxShadow:isActive?"0 0 0 2px rgba(180,83,9,.25)":"none"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:V.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{loc.name}</div>
                    <div style={{fontSize:11,color:V.text2,marginTop:1}}>{loc.code||"—"}</div>
                  </div>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:4,background:`${tc}22`,color:tc,whiteSpace:"nowrap",flexShrink:0}}>{loc.type}</span>
                </div>
                <div style={{display:"flex",gap:12,marginTop:8,fontSize:11,color:V.text2}}>
                  {(loc.city||loc.state)&&<span>📍 {[loc.city,loc.state].filter(Boolean).join(", ")}</span>}
                  {sc>0&&<span style={{color:"#b45309",fontWeight:600}}>{sc} shipment{sc!==1?"s":""}</span>}
                </div>
                {loc.customers&&loc.customers.length>0&&(
                  <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>
                    {loc.customers.slice(0,3).map(c=>(
                      <span key={c} style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:"#0f172a",color:"#94a3b8",border:"1px solid #334155"}}>{c}</span>
                    ))}
                    {loc.customers.length>3&&<span style={{fontSize:10,color:V.text2}}>+{loc.customers.length-3}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* RIGHT PANEL */}
      <div style={{overflowY:"auto",background:V.bg2,border:`1px solid ${V.border}`,borderRadius:12,padding:24}}>
        {!editing&&!displayLoc&&(
          <div style={{textAlign:"center",paddingTop:60,color:V.text2}}>
            <div style={{fontSize:40,marginBottom:12}}>🏭</div>
            <div style={{fontSize:15,fontWeight:600,color:V.text,marginBottom:6}}>Location Manager</div>
            <div style={{fontSize:13}}>Select a location to edit, or click + New to create one.</div>
          </div>
        )}

        {/* VIEW MODE — show details when a location is selected but not in edit mode */}
        {!editing&&displayLoc&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div>
                <div style={{fontSize:20,fontWeight:800,color:V.text}}>{displayLoc.name}</div>
                <div style={{fontSize:12,color:V.text2,marginTop:2}}>{displayLoc.code}{displayLoc.city||displayLoc.state?" · "+[displayLoc.city,displayLoc.state].filter(Boolean).join(", "):""}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>startEdit(displayLoc)} style={{fontSize:12,padding:"7px 16px",border:`1px solid ${V.border2}`,borderRadius:7,background:V.bg3,color:V.text,cursor:"pointer",fontWeight:600}}>✎ Edit</button>
                <button onClick={()=>setConfirmDel(displayLoc.id)} style={{fontSize:12,padding:"7px 14px",border:"1px solid #dc2626",borderRadius:7,background:"transparent",color:"#dc2626",cursor:"pointer",fontWeight:600}}>Delete</button>
              </div>
            </div>
            {confirmDel===displayLoc.id&&(
              <div style={{background:"#450a0a22",border:"1px solid #dc2626",borderRadius:8,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:13,color:V.text}}>Delete <strong>{displayLoc.name}</strong>? This cannot be undone.</span>
                <button onClick={()=>handleDelete(displayLoc.id)} style={{fontSize:12,padding:"5px 14px",border:"none",borderRadius:6,background:"#dc2626",color:"#fff",cursor:"pointer",fontWeight:700}}>Confirm Delete</button>
                <button onClick={()=>setConfirmDel(null)} style={{fontSize:12,padding:"5px 10px",border:`1px solid ${V.border2}`,borderRadius:6,background:"transparent",color:V.text2,cursor:"pointer"}}>Cancel</button>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
              {[["Type",displayLoc.type],["Code",displayLoc.code||"—"],["Address",displayLoc.address||"—"],["City / State",[displayLoc.city,displayLoc.state].filter(Boolean).join(", ")||"—"],["Contact",displayLoc.contact||"—"],["Phone",displayLoc.phone||"—"],["Email",displayLoc.email||"—"]].map(([k,v])=>(
                <div key={k}><div style={{fontSize:11,color:V.text2,fontWeight:600,marginBottom:2,textTransform:"uppercase",letterSpacing:.5}}>{k}</div><div style={{fontSize:13,color:V.text}}>{v}</div></div>
              ))}
            </div>
            {displayLoc.notes&&<div style={{marginBottom:20}}><div style={{fontSize:11,color:V.text2,fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>Notes</div><div style={{fontSize:13,color:V.text,lineHeight:1.6}}>{displayLoc.notes}</div></div>}
            <div>
              <div style={{fontSize:11,color:V.text2,fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Linked Customers ({(displayLoc.customers||[]).length})</div>
              {(displayLoc.customers||[]).length===0
                ?<div style={{fontSize:13,color:V.text2}}>No customers linked.</div>
                :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{displayLoc.customers.map(c=><span key={c} style={{fontSize:12,padding:"4px 10px",borderRadius:12,background:"#1e293b",color:"#94a3b8",border:"1px solid #334155"}}>{c}</span>)}</div>
              }
            </div>
          </div>
        )}

        {/* EDIT / NEW MODE */}
        {editing&&(
          <div>
            <div style={{fontSize:16,fontWeight:700,color:V.text,marginBottom:20}}>{isNew?"New Location":"Edit Location"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={sec}>
                <label style={lbl}>Location Name *</label>
                <input value={editing.name} onChange={e=>set("name",e.target.value)} style={fld} placeholder="e.g. Unitrans - PA"/>
              </div>
              <div style={sec}>
                <label style={lbl}>Code / Abbreviation</label>
                <input value={editing.code} onChange={e=>set("code",e.target.value)} style={fld} placeholder="e.g. UT-PA"/>
              </div>
              <div style={sec}>
                <label style={lbl}>Type</label>
                <select value={editing.type} onChange={e=>set("type",e.target.value)} style={fld}>
                  {TYPE_OPTS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div style={sec}>
                <label style={lbl}>Address</label>
                <input value={editing.address} onChange={e=>set("address",e.target.value)} style={fld} placeholder="Street address"/>
              </div>
              <div style={sec}>
                <label style={lbl}>City</label>
                <input value={editing.city} onChange={e=>set("city",e.target.value)} style={fld} placeholder="City"/>
              </div>
              <div style={sec}>
                <label style={lbl}>State</label>
                <input value={editing.state} onChange={e=>set("state",e.target.value)} style={fld} placeholder="e.g. PA"/>
              </div>
              <div style={sec}>
                <label style={lbl}>Contact Name</label>
                <input value={editing.contact} onChange={e=>set("contact",e.target.value)} style={fld} placeholder="Point of contact"/>
              </div>
              <div style={sec}>
                <label style={lbl}>Phone</label>
                <input value={editing.phone} onChange={e=>set("phone",e.target.value)} style={fld} placeholder="Phone number"/>
              </div>
              <div style={{...sec,gridColumn:"1/-1"}}>
                <label style={lbl}>Email</label>
                <input value={editing.email} onChange={e=>set("email",e.target.value)} style={fld} placeholder="contact@example.com"/>
              </div>
              <div style={{...sec,gridColumn:"1/-1"}}>
                <label style={lbl}>Notes</label>
                <textarea value={editing.notes} onChange={e=>set("notes",e.target.value)} rows={3} style={{...fld,resize:"vertical",fontFamily:"inherit",lineHeight:1.6}} placeholder="Any additional details…"/>
              </div>
            </div>

            {/* CUSTOMER ASSOCIATIONS */}
            <div style={{borderTop:`1px solid ${V.border}`,paddingTop:16,marginTop:4}}>
              <div style={{fontSize:12,fontWeight:700,color:V.text,marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>Linked Customers</div>
              <div style={{fontSize:12,color:V.text2,marginBottom:10}}>Toggle the customers whose freight ships to this location.</div>
              {allCustomers.length===0
                ?<div style={{fontSize:13,color:V.text2}}>No customer data yet.</div>
                :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {allCustomers.map(c=>{
                    const on=(editing.customers||[]).includes(c);
                    return(
                      <button key={c} onClick={()=>toggleCustomer(c)} style={{fontSize:12,padding:"5px 12px",borderRadius:12,border:on?"1px solid #b45309":"1px solid #334155",background:on?"#431407":"#1e293b",color:on?"#fb923c":"#94a3b8",cursor:"pointer",fontWeight:on?700:400,transition:"all .15s"}}>
                        {on?"✓ ":""}{c}
                      </button>
                    );
                  })}
                </div>
              }
            </div>

            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={handleSave} disabled={!editing.name.trim()} style={{fontSize:13,padding:"9px 28px",border:"none",borderRadius:8,background:editing.name.trim()?"#b45309":"#64748b",color:"#fff",cursor:editing.name.trim()?"pointer":"not-allowed",fontWeight:700,boxShadow:editing.name.trim()?"0 2px 10px rgba(180,83,9,.3)":"none"}}>
                {isNew?"Create Location":"Save Changes"}
              </button>
              <button onClick={cancelEdit} style={{fontSize:13,padding:"9px 18px",border:`1px solid ${V.border2}`,borderRadius:8,background:"transparent",cursor:"pointer",color:V.text,fontWeight:500}}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── BOOT ─────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
